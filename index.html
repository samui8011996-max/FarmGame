<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>快樂農場</title>
<style>
  
  *{ -webkit-tap-highlight-color:transparent; }
  html,body{ -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:manipulation; }
  input,textarea,[contenteditable]{ -webkit-user-select:text; user-select:text; }
  :root{
    --paper:#f1ead4; --paper2:#e3dabd; --ink:#423926; --ink2:#6e6450;
    --line:#cabf9f; --line2:#b7a78c; --accent:#7A7612; --accent2:#6e7a48;
    --gold:#b0883a; --danger:#a85d4c; --card:#f3f5e7; --shadow:rgba(66,57,38,.16);
    --grass:#9fb96a; --grass2:#94af60; --soil:#a9794f; --soil2:#9c6e46;
    --path:#d8c08a; --water:#7fb6c4; --fence:#8a6b45;
    --floor:#e3c79a; --floor2:#d8b985; --wall:#b89b72; --rug:#c98a6a;
    --tile:#e7d3ad; --tile2:#dec79c; --counter:#b98e5e; --brick:#9c6b52; --brick2:#8f6049;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Serif TC","Songti TC",serif;font-size:16px;
    -webkit-text-size-adjust:100%;touch-action:manipulation;overscroll-behavior:none}
  body{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .topbar{background:var(--paper2);border-bottom:2px solid var(--line2);padding:8px 12px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .topbar .who{font-weight:700;font-size:15px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 8px;font-size:13px}
  .stat b{color:var(--accent);font-variant-numeric:tabular-nums}
  .clock{margin-left:auto;font-size:13px;color:var(--ink2)}

  .title{text-align:center;color:var(--accent);font-size:19px;font-weight:700;letter-spacing:2px;margin:7px 0 2px}
  .recipe-bar{text-align:center;font-size:12px;color:var(--ink2);margin-bottom:4px;min-height:18px}
  .recipe-bar b{color:var(--accent)}
  .recipe-bar .step{display:inline-block;margin:0 2px;padding:1px 6px;border-radius:9px;background:var(--paper2);border:1px solid var(--line)}
  .recipe-bar .step.done{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .recipe-bar .step.cur{background:var(--gold);color:#fff;border-color:var(--gold)}

  .stagewrap{padding:0 12px;margin-top:2px}
  .stage{position:relative;width:100%;aspect-ratio:10/9;border:3px solid var(--fence);
    border-radius:10px;overflow:hidden;background:var(--grass);box-shadow:0 3px 0 var(--shadow)}
  #game{display:block;width:100%;height:100%;image-rendering:pixelated}
  .hint{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;background:#3a2c1cdd;
    color:var(--paper);font-size:13px;padding:5px 12px;border-radius:14px;opacity:0;
    transition:opacity .15s;pointer-events:none;white-space:nowrap}
  .hint.show{opacity:1}
  .ovenbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#3a2c1cdd;
    color:var(--paper);font-size:13px;padding:4px 12px;border-radius:12px;display:none;align-items:center;gap:8px}
  .ovenbar.show{display:flex}
  .ovenbar .meter{width:90px;height:8px;background:#ffffff33;border-radius:4px;overflow:hidden}
  .ovenbar .meter>i{display:block;height:100%;background:var(--accent2);width:0}
  .ovenbar.warn .meter>i{background:var(--gold)} .ovenbar.burn .meter>i{background:var(--danger)}

  .dialogue{margin:4px 12px 0px;background:var(--card);border:2px solid var(--line2);border-radius:14px;
    padding:9px 12px;display:flex;align-items:center;gap:10px;min-height:60px;box-shadow:0 2px 0 var(--shadow)}
  .dialogue .avatar{display:none}
  .dialogue .dlgtext{flex:1;font-size:14px;line-height:1.4;color:var(--ink)}
  .dialogue.idle{opacity:.65} .dialogue.idle .dlgtext{color:var(--ink2);font-size:13px}
  .dialogue .name{font-weight:700;color:var(--accent);margin-right:5px}

  .controls{padding:8px 16px 54px;display:flex;align-items:flex-end;justify-content:space-between}
  .bag{width:52px;height:52px;border-radius:12px;background:var(--card);border:2px solid var(--line2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21px;box-shadow:0 2px 0 var(--shadow)}
  .bag span{font-size:10px;color:var(--ink2);margin-top:-2px}
  .dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:6px}
.key{width:44px;height:44px;border-radius:11px;font-size:19px;font-weight:700;display:flex;
    align-items:center;justify-content:center;box-shadow:0 3px 0 #42392633;border:2px solid #46470422}
  .key:active{transform:translateY(2px);box-shadow:0 1px 0 #00000018}
  .k-up{grid-column:2;grid-row:1;background:#C6C485}
  .k-left{grid-column:1;grid-row:2;background:#C6C485}
  .k-down{grid-column:2;grid-row:2;background:#C6C485}
  .k-right{grid-column:3;grid-row:2;background:#C6C485}
  .actbtn{width:62px;height:62px;border-radius:50%;background:var(--accent);color:#fff;font-size:15px;
    font-weight:700;box-shadow:0 4px 0 #00000020;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1}
  .actbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #00000020}
  .actbtn.dim{background:var(--line2)}
  .actbtn.throw{background:var(--accent2)}

  /* 電腦版鍵盤提示：手機隱藏，電腦（滑鼠鍵盤）才顯示 */
  .kbhint{display:none;align-items:center;gap:8px;font-size:12px;
    color:var(--ink2);font-weight:700}
  .kbhint .keys{font-size:12px;color:var(--ink);background:var(--card);
    border:2px solid var(--line2);border-radius:8px;padding:3px 9px;
    letter-spacing:1px;box-shadow:0 2px 0 var(--shadow)}
  @media (min-width:820px){
    .dpad{display:none}      /* 電腦版隱藏上下左右 */
    .kbhint{display:flex}    /* 電腦版顯示 WASD/SPACE 提示 */

    /* 攻擊鈕區塊：釘右側 */
    .controls > div:last-child{
      position:fixed;
      right:max(12px, calc(50vw - 400px));
      top:calc(50% - 60px);
      z-index:40;
    }
    /* controls 本身只剩中間的鍵盤提示，置中即可 */
    .controls{justify-content:center}

    /* 背包：自成一塊獨立卡片，浮在導覽列上方、跟它對齊同一欄 */
    .controls .bag{
      position:fixed;
      left:max(12px, calc(50vw - 400px));
      top:calc(50% - 210px);          /* 背包那塊的高度，想上下移就改這個 */
      width:68px;height:68px;
      flex-direction:column;
      border:2px solid var(--line2);
      border-radius:14px;
      box-shadow:0 3px 0 var(--shadow);
      z-index:41;
    }
    .controls .bag span{ font-size:11px; margin-top:2px; }
    /* 攻擊鈕區塊維持靠右（這段你已經有，確認還在就好） */
  }

  .nav{background:var(--paper2);border-top:2px solid var(--line2);display:flex;margin-top:auto}
  .nav button{flex:1;padding:7px 2px 8px;font-size:11px;color:var(--ink2);display:flex;
    flex-direction:column;align-items:center;gap:1px;font-weight:700}
  .nav button .ic{font-size:19px}
  .nav button.on{color:var(--accent)} .nav button.on .ic{transform:scale(1.12)}
/* === 桌機 / 網頁版：導覽列移到左側直放（手機維持底部橫排） === */
  @media (min-width:820px){
    .nav{
      position:fixed;
      left:max(12px, calc(50vw - 400px));
      top:calc(50% + 30px);     /* 往下挪，跟上方背包分開 */
      transform:translateY(-50%);
      flex-direction:column;
      width:68px;
      margin-top:0;
      background:var(--paper2);
      border:2px solid var(--line2);
      border-radius:14px;
      box-shadow:0 3px 0 var(--shadow);
      overflow:hidden;
      z-index:40;
    }
    .nav button{
      flex:none;
      padding:13px 4px;
      font-size:11px;
      border-bottom:1px solid var(--line);
    }
    .nav button:last-child{border-bottom:none}
    .nav button .ic{font-size:21px}
  }
  .mask{position:fixed;inset:0;background:#3a2c1c66;z-index:50;display:none;align-items:flex-end;justify-content:center}
  .mask.show{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:640px;border-radius:18px 18px 0 0;padding:16px 16px 22px;max-height:82vh;overflow:auto}
  .sheethead{display:flex;align-items:center;margin-bottom:10px}
  .sheethead h3{margin:0;font-size:18px}
  .sheethead .close{margin-left:auto;font-size:22px;color:var(--ink2);padding:0 6px}
  .small{font-size:12px;color:var(--ink2)}
  .row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .row:last-child{border-bottom:none}
  .row .e{font-size:22px;width:32px;text-align:center}
  .row .info{flex:1;min-width:0}
  .row .info .n{font-weight:700;font-size:14px}
  .row .info .d{font-size:12px;color:var(--ink2)}
  .price{font-variant-numeric:tabular-nums;font-weight:700}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .btn{background:var(--accent);color:#fff;border-radius:10px;padding:7px 12px;font-size:14px;font-weight:700;box-shadow:0 2px 0 #00000018;white-space:nowrap}
  .btn:active{transform:translateY(1px);box-shadow:none}
  .btn.sm{padding:5px 9px;font-size:13px}
  .btn.green{background:var(--accent2)} .btn.gold{background:var(--gold)}
  .btn.ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--line2)}
  .btn.dis{background:var(--line2);color:#fff8;pointer-events:none}
  .tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .tabs button{background:var(--paper2);border:1px solid var(--line);border-radius:16px;padding:4px 11px;font-size:13px;font-weight:700;color:var(--ink2)}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .menucard{border:2px solid var(--line);border-radius:12px;padding:9px;margin-bottom:8px;background:var(--card)}
  .menucard.on{border-color:var(--accent2);background:#f3f7ec}
  .seedchip{display:inline-flex;gap:3px;background:var(--paper2);border:1px solid var(--line);border-radius:18px;padding:3px 9px;font-size:13px;margin:3px}
  .hr{height:1px;background:var(--line);margin:9px 0}
  .empty-note{text-align:center;color:var(--ink2);font-size:13px;padding:14px}

  /* splash */
  .splash{position:fixed;inset:0;background:var(--paper);z-index:80;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center}
  .splash h1{font-size:30px;margin:0 0 4px;letter-spacing:2px}
  .splash p{color:var(--ink2);margin:0 0 22px}
  .splash input{width:100%;max-width:300px;padding:13px 14px;border:2px solid var(--line2);border-radius:12px;
    background:var(--card);text-align:center;font-weight:700;font-size:18px;margin-bottom:12px;font-family:inherit}

  #toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:9px 16px;border-radius:22px;font-size:14px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
</style>
</head>
<body>

<!-- splash -->
<div class="splash" id="splash">
  <div style="font-size:54px">🌾</div>
  <h1>快樂農場</h1>
  <p>輸入你的暱稱開始經營</p>
  <input id="nickInput" placeholder="你的暱稱" maxlength="12" autocomplete="off">
  <button class="btn" style="width:100%;max-width:300px;padding:13px" onclick="submitNick()">開始經營</button>
  <button onclick="wipeSave()" style="margin-top:16px;background:none;border:none;color:var(--danger);font-size:12px;text-decoration:underline;opacity:.7;font-family:inherit">🗑️ 刪除舊存檔</button>
  <div id="saveList" style="margin-top:16px"></div>
  <p class="small" style="margin-top:18px">進度自動存在這台裝置</p>
</div>

<!-- game shell -->
<div id="shell" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <span class="who" id="whoName">—</span>
    <span class="stat">💰<b id="cash">0</b></span>
    <span class="stat">📈<b id="net">0</b></span>
    <span class="stat">❤️<b id="hp">20/20</b></span>
    <span class="clock" id="clock">第 1 天</span>
  </div>
  <div class="title" id="sceneTitle">農牧地</div>
  <div class="recipe-bar" id="recipeBar"></div>
  <div class="stagewrap">
    <div class="stage">
      <canvas id="game" width="320" height="288"></canvas>
      <div class="ovenbar" id="ovenbar"><span id="ovenTxt">烘烤中</span><div class="meter"><i id="ovenFill"></i></div></div>
      <div class="hint" id="hint"></div>
      <div id="fishUI" style="display:none">
        <button onclick="landBoat(true)" style="position:absolute;top:8px;right:8px;z-index:6;background:#3a2c1cdd;color:#f1ead4;border:none;border-radius:12px;padding:6px 12px;font-size:13px;font-weight:700">🏠 靠岸</button>
        <div id="fishHpWrap" style="position:absolute;top:8px;left:8px;z-index:6;background:#3a2c1cdd;color:#f1ead4;border-radius:12px;padding:5px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px">
          🚢<div style="width:70px;height:8px;background:#ffffff33;border-radius:4px;overflow:hidden"><i id="fishHpFill" style="display:block;height:100%;width:100%;background:#6fae5e"></i></div>
        </div>
        <div id="fishScore" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:6;background:#3a2c1cdd;color:#f1ead4;border-radius:12px;padding:5px 12px;font-size:13px;font-weight:700;white-space:nowrap">🎣 0　$0</div>
      </div>
    </div>
  </div>
  <div class="dialogue idle" id="dialogue">
    <div class="avatar" id="dlgAvatar">🙂</div>
    <div class="dlgtext" id="dlgText">用方向鍵走動，走到物件旁按互動鍵。</div>
  </div>
  <div class="controls">
    <div class="bag" onclick="openBag()">🎒<span>背包</span></div>
    <div class="dpad">
      <button class="key k-up"    ontouchstart="press('up',event)"   ontouchend="release('up')"   onmousedown="press('up',event)"   onmouseup="release('up')"   onmouseleave="release('up')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 4L19 17H3L11 4Z" fill="#4a3b2a"/></svg></button>
      <button class="key k-left"  ontouchstart="press('left',event)" ontouchend="release('left')" onmousedown="press('left',event)" onmouseup="release('left')" onmouseleave="release('left')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 11L5 3L5 19L18 11Z" fill="#4a3b2a" transform="rotate(180 11 11)"/></svg></button>
      <button class="key k-down"  ontouchstart="press('down',event)" ontouchend="release('down')" onmousedown="press('down',event)" onmouseup="release('down')" onmouseleave="release('down')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 18L3 5H19L11 18Z" fill="#4a3b2a"/></svg></button>
      <button class="key k-right" ontouchstart="press('right',event)" ontouchend="release('right')" onmousedown="press('right',event)" onmouseup="release('right')" onmouseleave="release('right')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 11L17 3L17 19L4 11Z" fill="#4a3b2a" transform="rotate(180 11 11)"/>
</svg></button>
    </div>
    <div class="kbhint">
      <span class="keys">WASD</span>移動
      <span class="keys">SPACE</span>互動
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <button id="fishWeaponBtn" ontouchstart="weaponBtn(event)" onmousedown="weaponBtn(event)" style="display:none;width:44px;height:44px;border-radius:11px;background:var(--card);border:2px solid var(--line2);font-size:17px;flex-direction:column;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 0 var(--shadow)">⚔️<span style="font-size:10px;color:var(--ink2)">攻擊</span></button>
     <button id="equipBtn" ontouchstart="throwToxin(event)" onmousedown="throwToxin(event)"  style="display:none;width:44px;height:44px;border-radius:11px;background:var(--card);border:2px solid var(--line2);font-size:17px;flex-direction:column;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 0 var(--shadow)">🧪<span id="equipCount" style="font-size:10px;color:var(--ink2)">0</span></button>
    <button class="actbtn dim" id="actBtn" ontouchstart="actDown(event)" ontouchend="actUp()" onmousedown="actDown(event)" onmouseup="actUp()" onmouseleave="actUp()">
<svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#423926">
    <ellipse cx="5.4" cy="9" rx="1.9" ry="2.5"/>
    <ellipse cx="9.6" cy="6.2" rx="2" ry="2.7"/>
    <ellipse cx="14.4" cy="6.2" rx="2" ry="2.7"/>
    <ellipse cx="18.6" cy="9" rx="1.9" ry="2.5"/>
    <path d="M12 10.8c3.7 0 6.6 2.7 6.6 5.6 0 2.3-2.1 3.4-3.9 2.6-1-.4-1.7-.7-2.7-.7s-1.7.3-2.7.7c-1.8.8-3.9-.3-3.9-2.6 0-2.9 2.9-5.6 6.6-5.6z"/>
  </svg>
</button>
    </div>
  </div>
  <nav class="nav" id="nav">
    <button data-s="farm" onclick="goScene('farm')"><span class="ic">🌱</span>農牧地</button>
    <button data-s="cafe" onclick="goScene('cafe')"><span class="ic">🍽️</span>餐廳</button>
    <button data-s="office" onclick="goScene('office')"><span class="ic">🏠</span>辦公室</button>
    <button onclick="openTravel()"><span class="ic">🗺️</span>前往</button>
  </nav>
</div>

<div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>
<script src="dialogue.js"></script>
<script>
  
/* =========================================================
   快樂農場 — 整合版（走動 + 經營）
   引擎共用：移動/碰撞/鏡頭/對話/互動
   場景=資料：farm / cafe / kitchen / shop / office
   經濟狀態 S：共用、存 localStorage
   ========================================================= */
const NS='happy_farm_';
const HOUR=3600*1000, DAY=24*HOUR;
const TS=16, VIEW_COLS=20, VIEW_ROWS=18;
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

/* ---------- static data ---------- */
const CROPS={
  strawberry:{nm:'草莓',e:'🍓',base:8,seed:3,grow:DAY,volat:'big'},

};
const ANIMALS={
  chicken:{nm:'雞',e:'🐔',cub:5,feed:1,prod:'egg',cycle: 30000,mode:'produce',growFeed:2},
  cow:{nm:'牛',e:'🐄',cub:25,feed:3,prod:'milk',cycle: 30000,mode:'produce',growFeed:2},
  pig:{nm:'豬',e:'🐖',cub:13,feed:2,prod:'pork',cycle:3,mode:'fatten',growFeed:2},
};
const PRODUCTS={
  strawberry:{nm:'草莓',e:'🍓',base:8,volat:'big'},
  corn:{nm:'玉米',e:'🌽',base:4,volat:'small'},
  potato:{nm:'馬鈴薯',e:'🥔',base:4,volat:'small'},
  apple:{nm:'蘋果',e:'🍎',base:6,volat:'small'},
  tomato:{nm:'番茄',e:'🍅',base:5,volat:'small'},
  lemon:{nm:'檸檬',e:'🍋',base:6,volat:'small'},
  olive_oil:{nm:'橄欖油',e:'🫒',base:12,volat:'mid'},
  egg:{nm:'雞蛋',e:'🥚',base:10,volat:'mid'},
  milk:{nm:'牛奶',e:'🥛',base:10,volat:'mid'},
  cheese:{nm:'乳酪',e:'🧀',base:18,volat:'mid'},
  butter:{nm:'奶油',e:'🧈',base:14,volat:'mid'},
  pork:{nm:'豬肉',e:'🥓',base:10,volat:'mid'},
  beef:{nm:'牛肉',e:'🥩',base:12,volat:'mid'},

function bowlFull(zone){ return Date.now() - ((S.feedBowl&&S.feedBowl[zone])||0) < BOWL_FULL_MS; }
function eggCap(){ return EGG_BOX_COUNT*EGG_PER_BOX; }
function eggTotalPending(){ let s=0; const list=(S.animals&&S.animals.chicken)||[]; for(const a of list) s+=(a.pending||0); return s; }
function eggBoxes(){ return Math.min(EGG_BOX_COUNT, Math.ceil(eggTotalPending()/EGG_PER_BOX)); }  // 要疊幾張圖＝有蛋的箱數
const CHICKEN_ZONE={x1:23,y1:18,x2:28,y2:23};   // 對應 FARM_ZONES 的雞舍範圍
const CHICKEN_SPEED=0.035, CHICKEN_FRAME_MS=400;
let chickenNpcs=[];
function chickenWalkable(x,y){
  const ix=Math.round(x),iy=Math.round(y),z=CHICKEN_ZONE;
  return ix>=z.x1&&ix<=z.x2&&iy>=z.y1&&iy<=z.y2;
}
function pickChickenTarget(c){
  const z=CHICKEN_ZONE;
  for(let i=0;i<12;i++){
    const tx=z.x1+Math.floor(Math.random()*(z.x2-z.x1+1));
    const ty=z.y1+Math.floor(Math.random()*(z.y2-z.y1+1));
    if(chickenWalkable(tx,ty)){ c.tx=tx; c.ty=ty; return; }
  }
}
function buildChickens(){
  chickenNpcs=[];
  const list=(S.animals&&S.animals.chicken)||[];
  list.forEach((a,i)=>{
    const slotX=CHICKEN_ZONE.x1+(i%((CHICKEN_ZONE.x2-CHICKEN_ZONE.x1)||1));
    const slotY=CHICKEN_ZONE.y1+(i%((CHICKEN_ZONE.y2-CHICKEN_ZONE.y1+1)));
    chickenNpcs.push({ idx:i, x:slotX, y:slotY, tx:slotX, ty:slotY,
      flip:false, frame:0, frameT:0, idleUntil:0 });
  });
}
function isHen(a){ return (a.feedCount||0) >= (ANIMALS.chicken.growFeed||2); }
function updateChickens(){
  const now=Date.now(), list=(S.animals&&S.animals.chicken)||[];
  if(chickenNpcs.length!==list.length) buildChickens();
  for(const c of chickenNpcs){
    const dx=c.tx-c.x, dy=c.ty-c.y, d=Math.hypot(dx,dy);
    if(d<0.1){
      if(!c.idleUntil) c.idleUntil=now+800+Math.random()*2500;
      else if(now>=c.idleUntil){ c.idleUntil=0; pickChickenTarget(c); }
    }else{
      c.idleUntil=0;
      c.x+=(dx/d)*CHICKEN_SPEED; c.y+=(dy/d)*CHICKEN_SPEED;
      if(Math.abs(dx)>0.01) c.flip = dx<0;   // 往左走→鏡像
      if(now-c.frameT>=CHICKEN_FRAME_MS){ c.frameT=now; c.frame=(c.frame+1)%2; }
    }
  }
}
function drawChickens(ox,oy){
  const list=(S.animals&&S.animals.chicken)||[];
  for(const c of chickenNpcs){
    const a=list[c.idx]; if(!a) continue;
    const turkey=a.species==='turkey', adult=isHen(a);
    const img = turkey ? (adult?TURKEY_IMG:CHICK_IMG) : (adult?HEN_IMG:CHICK_IMG);
    const px=c.x*TS+TS/2-ox, py=c.y*TS+TS/2-oy;
    const shW=adult?12:5, shH=adult?4:2, shY=4;   // 大隻：影子大
    ctx.globalAlpha=1; ctx.fillStyle='#00000022';
    ctx.beginPath();ctx.ellipse(px,py+shY,shW,shH,0,0,Math.PI*2);ctx.fill();
    if(img && img.complete && img.naturalWidth){
      const fw=32, fh=32, sx=c.frame*fw;
      if(c.flip){
        ctx.save(); ctx.translate(px,0); ctx.scale(-1,1);
        ctx.drawImage(img, sx,0,fw,fh, -16, py-32+6, 32,32);
        ctx.restore();
      }else{

      ctx.fillText(turkey?(adult?'🦃':'🐤'):(adult?'🐔':'🐤'), px, py);

const ALFRED_ZONE={x1:0,y1:24,x2:21,y2:27};   // 阿爾在農田的活動範圍，想換地方就改這
let farmNpcs={};
function farmNpcWalkable(x,y){
  const ix=Math.round(x),iy=Math.round(y);
  if(ix<ALFRED_ZONE.x1||ix>ALFRED_ZONE.x2||iy<ALFRED_ZONE.y1||iy>ALFRED_ZONE.y2) return false;
  return snakeWalkable(ix,iy);   // 不走柵欄、不撞牆
}
function pickFarmNpcTarget(n){
  for(let i=0;i<20;i++){
    const tx=ALFRED_ZONE.x1+Math.floor(Math.random()*(ALFRED_ZONE.x2-ALFRED_ZONE.x1+1));
    const ty=ALFRED_ZONE.y1+Math.floor(Math.random()*(ALFRED_ZONE.y2-ALFRED_ZONE.y1+1));
    if(farmNpcWalkable(tx,ty)){ n.tx=tx; n.ty=ty; return; }
  }
}
function buildFarmNpcs(){
  farmNpcs={};
  SCENES.farm.objects=SCENES.farm.objects.filter(o=>o.id!=='alfred');
  if(S.child && S.child.stage===3){   // 少年期才出現在農田
    const nm=S.child.name||'阿爾弗雷德', sx=8, sy=24;
    SCENES.farm.objects.push({id:'alfred',x:sx,y:sy,e:'🧑‍🎓',nm,kind:'farmhand',npc:true,avatar:'🧑‍🎓',hide:true});
    farmNpcs['alfred']={ x:sx,y:sy, tx:sx,ty:sy, facing:'down', frame:0,aTimer:0,aStep:0,moving:false,idleUntil:0,
      img:npcImg('child_teen.png'), fallback:'🧑‍🎓' };
  }
}
function updateFarmNpcs(){
  const now=Date.now();
  for(const id in farmNpcs){
    const n=farmNpcs[id];
    const dx=n.tx-n.x, dy=n.ty-n.y, d=Math.hypot(dx,dy);
    if(d<0.12){
      n.moving=false;
      if(!n.idleUntil) n.idleUntil=now+1200+Math.random()*2800;
      else if(now>=n.idleUntil){ n.idleUntil=0; pickFarmNpcTarget(n); }
    }else{
      n.idleUntil=0;
      const nx=n.x+(dx/d)*NPC_SPEED, ny=n.y+(dy/d)*NPC_SPEED;
      if(farmNpcWalkable(nx,n.y)) n.x=nx; else pickFarmNpcTarget(n);
      if(farmNpcWalkable(n.x,ny)) n.y=ny;
      n.facing = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
      n.moving=true;
    }
    if(n.moving){ if(++n.aTimer>=WALK_SPEED){ n.aTimer=0; n.aStep=(n.aStep+1)%WALK_CYCLE.length; } n.frame=WALK_CYCLE[n.aStep]; }
    else { n.frame=0; n.aTimer=0; n.aStep=0; }
    const o=SCENES.farm.objects.find(ob=>ob.id===id);
    if(o){ o.x=Math.round(n.x); o.y=Math.round(n.y); }
  }
}
function drawFarmNpcs(ox,oy){
  for(const id in farmNpcs){
    const n=farmNpcs[id];
    const px=n.x*TS+TS/2-ox, py=n.y*TS+TS/2-oy;
    ctx.globalAlpha=1; ctx.fillStyle='#00000022';

const MONSTER_CAP=2, SNAKE_SPEED=0.07, AGGRO=5, BITE_RANGE=0.7, BITE_CD=1200, SNAKE_DMG=2, SPAWN_MS=12000;
function randFarmTile(){
  const C=GRID.farm[0].length, R=GRID.farm.length;
  for(let i=0;i<30;i++){
    const x=1+Math.floor(Math.random()*(C-2)), y=1+Math.floor(Math.random()*(R-2));
    if(snakeWalkable(x,y) && Math.hypot(x-player.x,y-player.y)>5) return {x,y};
  }
  return null;
}
function inFencedPen(ix,iy){
  return FARM_ZONES.some(z=>(z.kind==='chicken'||z.kind==='cow'||z.kind==='pig')
    && ix>=z.x1&&ix<=z.x2&&iy>=z.y1&&iy<=z.y2);
}
function snakeWalkable(x,y){ const ix=Math.floor(x),iy=Math.floor(y),C=GRID.farm[0].length,R=GRID.farm.length;
  if(ix<0||iy<0||ix>=C||iy>=R) return false;
  if(inFencedPen(ix,iy)) return false;            // 不進柵欄（雞舍／牛棚／豬圈）
  return !blocked(GRID.farm[iy][ix]); }
function spawnSnake(){ const p=randFarmTile(); if(!p) return; monsters.push({x:p.x,y:p.y,hp:4,lastBite:0,wanderT:0,wx:0,wy:0,facing:'down',frame:0,aTimer:0,aStep:0,moving:false}); }
function spawnSnakes(){ monsters=[]; shots=[]; if(S.childHired) return; for(let i=0;i<MONSTER_CAP;i++) spawnSnake(); lastSpawn=Date.now(); }
function updateMonsters(){
  if(S.childHired){ if(monsters.length) monsters=[]; return; }
  const now=Date.now();
  if(monsters.length<MONSTER_CAP && now-lastSpawn>SPAWN_MS){ lastSpawn=now; spawnSnake(); }
  for(const m of monsters){
    const px0=m.x, py0=m.y;
    const dx=player.x-m.x, dy=player.y-m.y, dist=Math.hypot(dx,dy)||0.001;
    if(dist<=AGGRO){
      const nx=m.x+(dx/dist)*SNAKE_SPEED, ny=m.y+(dy/dist)*SNAKE_SPEED;
      if(snakeWalkable(nx,m.y)) m.x=nx;
      if(snakeWalkable(m.x,ny)) m.y=ny;
      m.facing = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
      if(dist<=BITE_RANGE && now-m.lastBite>=BITE_CD){ m.lastBite=now; damagePlayer(Math.max(1,Math.round(SNAKE_DMG*combatDefMul()))); }
    }else{
      if(now>m.wanderT){ m.wanderT=now+1000+Math.random()*1500; const a=Math.random()*Math.PI*2; m.wx=Math.cos(a); m.wy=Math.sin(a); }
      if(snakeWalkable(m.x+m.wx*SNAKE_SPEED*0.5, m.y)) m.x+=m.wx*SNAKE_SPEED*0.5;
      if(snakeWalkable(m.x, m.y+m.wy*SNAKE_SPEED*0.5)) m.y+=m.wy*SNAKE_SPEED*0.5;
      m.facing = Math.abs(m.wx)>Math.abs(m.wy) ? (m.wx>0?'right':'left') : (m.wy>0?'down':'up');
    }
    m.moving = (Math.abs(m.x-px0)>0.0005 || Math.abs(m.y-py0)>0.0005);
    if(m.moving){ if(++m.aTimer>=WALK_SPEED){ m.aTimer=0; m.aStep=(m.aStep+1)%WALK_CYCLE.length; } m.frame=WALK_CYCLE[m.aStep]; }
    else { m.frame=0; m.aTimer=0; m.aStep=0; }
  }
}

let shots=[];
let equipped=null;   // null=空手；'toxin'=選了毒物。之後要加別的工具就放這
const THROW_SPEED=0.35, TOXIN_DMG=2, SHOT_LIFE=60, HIT_RANGE=0.7;
function toggleEquip(ev){
  if(ev)ev.preventDefault();
  if(curScene==='fishing'){ fishToggleWeapon(); return; }
  if(curScene==='fishing'){ fishAttack(); return; }   // 捕魚場景：互動鍵＝攻擊
  if(curScene!=='farm'){ toast('只能在農牧地使用'); return; }
  equipped = (equipped==='toxin') ? null : 'toxin';
  toast(equipped==='toxin' ? '🧪 已選擇毒物：按互動鍵投擲' : '收起毒物，恢復一般互動');
}
function throwToxin(ev){
  if(ev)ev.preventDefault();
  if(curScene!=='farm'){ toast('只能在農牧地投擲'); return; }
  if((S.toxins||0)<=0){ toast('沒有毒物，去廚房做'); return; }
  S.toxins--;
  const d=DIR[player.facing]||{x:0,y:-1};
  shots.push({ x:player.x, y:player.y, dx:d.x*THROW_SPEED, dy:d.y*THROW_SPEED, life:SHOT_LIFE });
  save();
}
function updateShots(){
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i]; s.x+=s.dx; s.y+=s.dy; s.life--;
    let hit=!snakeWalkable(s.x,s.y);
    if(!hit){
      for(let j=monsters.length-1;j>=0;j--){
        const m=monsters[j];
        if(Math.hypot(m.x-s.x,m.y-s.y)<=HIT_RANGE){
          m.hp-=TOXIN_DMG*combatAtkMul(); hit=true;
          if(m.hp<=0){ monsters.splice(j,1); earn(2,'打死蛇'); toast('💥 打死一條蛇 +$2'); }
          else toast('🧪 命中！');
          break;
        }
      }
    }
    if(hit || s.life<=0) shots.splice(i,1);
  }
}

function partnerPick(opt){
  const p=S.partner; if(!p) return;
  p.intimacy=(p.intimacy||0)+(opt.g||0);
  if(p.intimacy<=BREAKUP_INTIMACY){ breakupPartner(); return; }
  save(); _convoCid=p.id;

  const rep=opt.r||{who:'partner',mood:'happy',t:'嗯。'};

    {t:'再聊聊', run:()=>chatPartner()},
    {t:'結束', cls:'green', run:()=>openPartner()} ]);

function breakupPartner(){
  const p=S.partner; if(!p) return;
  const id=p.id;
  _convoCid=id; freezeNpcById('partner');     // 表情要對、對方先停下
  const lines=(typeof BREAKUP_CONVOS!=='undefined' && (BREAKUP_CONVOS[id]||BREAKUP_CONVOS._default))
            || [{who:'partner',mood:'sad',t:'…也許我們比較適合當朋友。'}];

function finalizeBreakup(id){

const NPC_IMG={};
function npcImg(src){ if(!NPC_IMG[src]){ const i=new Image(); i.src=src; NPC_IMG[src]=i; } return NPC_IMG[src]; }
const PARTNER_ZONE={x1:2,y1:10,x2:9,y2:13};   // 伴侶活動範圍（辦公室格座標）

const NPC_SPEED=0.05;
let officeNpcs={};
function officeWalkable(x,y){ const ix=Math.floor(x),iy=Math.floor(y),g=GRID.office;
  if(iy<0||ix<0||iy>=g.length||ix>=g[0].length) return false; return !blocked(g[iy][ix]); }
function buildOfficeNpcs(){
  officeNpcs={};
  if(S.partner){
    officeNpcs['partner']={ x:5,y:11, tx:5,ty:11, facing:'down', frame:0,aTimer:0,aStep:0,moving:false,idleUntil:0,
      zone:PARTNER_ZONE, img:npcImg(partnerSpriteSrc()), fallback:(MERCHANTS[S.partner.id]||{}).e||'🙂' };

      zone:CHILD_ZONE, img:npcImg('child_'+CHILD_STAGES[S.child.stage].key+'.png'), fallback:CHILD_STAGES[S.child.stage].e };

function pickNpcTarget(n){
  for(let i=0;i<20;i++){
    const tx=n.zone.x1+Math.floor(Math.random()*(n.zone.x2-n.zone.x1+1));
    const ty=n.zone.y1+Math.floor(Math.random()*(n.zone.y2-n.zone.y1+1));
    if(officeWalkable(tx,ty)){ n.tx=tx; n.ty=ty; return; }
  }
}
function updateOfficeNpcs(){
  const now=Date.now();
  for(const id in officeNpcs){
    const n=officeNpcs[id];
    if(n.frozen){ n.moving=false; n.frame=0; continue; }
    const dx=n.tx-n.x, dy=n.ty-n.y, d=Math.hypot(dx,dy);
    if(d<0.12){
      n.moving=false;
      if(!n.idleUntil) n.idleUntil=now+1200+Math.random()*2500;
      else if(now>=n.idleUntil){ n.idleUntil=0; pickNpcTarget(n); }
    }else{
      n.idleUntil=0;
      const nx=n.x+(dx/d)*NPC_SPEED, ny=n.y+(dy/d)*NPC_SPEED;
      if(officeWalkable(nx,n.y)) n.x=nx; else pickNpcTarget(n);
      if(officeWalkable(n.x,ny)) n.y=ny;
      n.facing = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
      n.moving=true;
    }
    if(n.moving){ if(++n.aTimer>=WALK_SPEED){ n.aTimer=0; n.aStep=(n.aStep+1)%WALK_CYCLE.length; } n.frame=WALK_CYCLE[n.aStep]; }
    else { n.frame=0; n.aTimer=0; n.aStep=0; }
    const o=SCENES.office.objects.find(ob=>ob.id===id);
    if(o){ o.x=Math.round(n.x); o.y=Math.round(n.y); }   // 互動點跟著移動
  }
}
function drawOfficeNpcs(ox,oy){
  for(const id in officeNpcs){
    if(intimCG && id==='partner') continue;
    const n=officeNpcs[id];
    const px=n.x*TS+TS/2-ox, py=n.y*TS+TS/2-oy;
    ctx.globalAlpha=1; ctx.fillStyle='#00000022';
    ctx.beginPath();ctx.ellipse(px,py+6,12,4,0,0,Math.PI*2);ctx.fill();
    if(n.img && n.img.complete && n.img.naturalWidth){
      const dirCols={down:0,left:1,right:2,up:3}, sx=(dirCols[n.facing]||0)*64, sy=n.frame*64;
      ctx.drawImage(n.img, sx,sy,64,64, px-32, py-64+14, 64,64);
    }else{
      ctx.fillStyle='#000'; ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.fallback||'🙂', px, py);
    }
  }
}

const SIT_SWITCH_MIN=12000, SIT_SWITCH_MAX=25000;   // 每隔這麼久考慮換一次「坐/走」
function hasSeat(id){ return !!MERCHANT_SEAT[id]; }
function schedSwitch(n){ n.nextSwitch=Date.now()+SIT_SWITCH_MIN+Math.random()*(SIT_SWITCH_MAX-SIT_SWITCH_MIN); }
function enterSit(n){
  const seat=MERCHANT_SEAT[n.mid]; if(!seat) return;
  n.mode='sit'; n.moving=false; n.frame=0;
  n.x=seat.x; n.y=seat.y; n.tx=seat.x; n.ty=seat.y;   // 邏輯位置貼到座位→互動點也在座位
  schedSwitch(n);
}
function enterWalk(n){
  n.mode='walk';
  const slot=PORT_SLOTS[(S.port.merchants||[]).indexOf(n.mid)]||{x:9,y:6};
  n.x=slot.x; n.y=slot.y;   // 起身：先回碼頭區，再開始晃（不要從商會橫越半張地圖）
  schedSwitch(n); pickPortTarget(n);
}
function buildPortNpcs(){
  portNpcs={};
  (S.port.merchants||[]).forEach((id,i)=>{
    const m=MERCHANTS[id]; if(!m) return;
    const slot=PORT_SLOTS[i]||{x:9,y:6};
    const n={ x:slot.x,y:slot.y, tx:slot.x,ty:slot.y, facing:'down', frame:0,aTimer:0,aStep:0,moving:false,idleUntil:0,
      zone:PORT_ZONE, img:npcImg('partner_'+id+'.png'), fallback:m.e, mid:id, mode:'walk' };
    schedSwitch(n);
    portNpcs['mc_'+id]=n;
    if(hasSeat(id) && Math.random()<0.5) enterSit(n);   // 進場時一半機率正坐在商會
  });
}
function pickPortTarget(n){
  for(let i=0;i<20;i++){
    const tx=n.zone.x1+Math.floor(Math.random()*(n.zone.x2-n.zone.x1+1));
    const ty=n.zone.y1+Math.floor(Math.random()*(n.zone.y2-n.zone.y1+1));
    if(portWalkable(tx,ty)){ n.tx=tx; n.ty=ty; return; }
  }
}
function updatePortNpcs(){
  const now=Date.now();
  for(const id in portNpcs){
    const n=portNpcs[id];
    if(n.frozen){ n.moving=false; n.frame=0; continue; }
    if(n.mode==='sit'){                                // 坐著：不移動，互動點固定在座位
      n.moving=false; n.frame=0;
      const o=SCENES.port.objects.find(ob=>ob.id===id);
      if(o){ o.x=Math.round(n.x); o.y=Math.round(n.y); }

    const dx=n.tx-n.x, dy=n.ty-n.y, d=Math.hypot(dx,dy);
    if(d<0.12){
      n.moving=false;
      if(!n.idleUntil) n.idleUntil=now+1200+Math.random()*2500;
      else if(now>=n.idleUntil){ n.idleUntil=0; pickPortTarget(n); }
    }else{
      n.idleUntil=0;
      const nx=n.x+(dx/d)*NPC_SPEED, ny=n.y+(dy/d)*NPC_SPEED;
      if(portWalkable(nx,n.y)) n.x=nx; else pickPortTarget(n);
      if(portWalkable(n.x,ny)) n.y=ny;
      n.facing = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
      n.moving=true;
    }
    if(n.moving){ if(++n.aTimer>=WALK_SPEED){ n.aTimer=0; n.aStep=(n.aStep+1)%WALK_CYCLE.length; } n.frame=WALK_CYCLE[n.aStep]; }
    else { n.frame=0; n.aTimer=0; n.aStep=0; }
    const o=SCENES.port.objects.find(ob=>ob.id===id);
    if(o){ o.x=Math.round(n.x); o.y=Math.round(n.y); }
  }
}

function playIntimacyCG(src, ms, done){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:95;background:#3a2c1ccc;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s';
  ov.innerHTML=`<img src="${src}" style="max-width:92%;max-height:82%;object-fit:contain;border-radius:12px;image-rendering:pixelated;box-shadow:0 6px 24px #0006">`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.style.opacity=1);
  let closed=false;
  const end=()=>{ if(closed)return; closed=true; ov.style.opacity=0; setTimeout(()=>{ ov.remove(); if(done)done(); },300); };
  const t=setTimeout(end, ms||1600);
  ov.onclick=()=>{ clearTimeout(t); end(); };
}

/* ---------- market: mean reversion + shocks ---------- */
function rollMarket(){
  for(const k in PRODUCTS){
    const p=PRODUCTS[k];const m=S.market[k]||{price:p.base};
    const[sa,ba]=volRange(p.volat);
    let price=m.price+(p.base-m.price)*0.45;
    price+=price*(Math.random()*2-1)*sa*0.5;
    if(Math.random()<0.10){const d=Math.random()<0.5?-1:1;price=price*(1+d*(ba*0.5+Math.random()*ba*0.5));}
    price=Math.max(p.base*0.35,price);
    m.price=Math.round(price*10)/10;S.market[k]=m;
  }
  S.marketDay=S.day;
}
function priceOf(k){return S.market[k]?S.market[k].price:PRODUCTS[k].base;}
function priceDir(k){const m=S.market[k];if(!m)return 0;return m.price>PRODUCTS[k].base*1.05?1:m.price<PRODUCTS[k].base*0.95?-1:0;}

/* ---------- tick: time progression ---------- */
function tick(){
  const now=Date.now();
  if(S.hp<S.maxHp && now-lastRegen>=HP_REGEN_MS){ lastRegen=now; S.hp=Math.min(S.maxHp,S.hp+1); }
  const newDay=Math.floor((now-S.startTs)/DAY)+1;
  if(newDay>S.day || !S.market.strawberry){ S.day=Math.max(S.day,newDay); if(S.marketDay!==S.day) rollMarket(); }
  // employee wages
  if(S.employee){
    while(now-S.employee.lastPaidTs>=30*DAY){
      if(S.cash>=300){spend(300,'雇員月薪');S.employee.lastPaidTs+=30*DAY;addLog('💸 付雇員月薪 $300');}
      else{addLog('👷 沒錢付月薪，雇員離職');S.employee=null;break;}
    }
  }
  const emp=!!S.employee || (isPartnerWorking()&&S.partner.job==='farm') || S.childHired;
  // crops（每格、要澆水才長）
 for(const key in S.crops){
    const c=S.crops[key]; const def=FARM_CROPS[c.crop]; if(!def){delete S.crops[key];continue;}
    const last=def.stages.length-1;
    if(emp) c.watered=true;
    if(c.stage<last && c.watered && now-c.t>=def.stageMs){ c.stage++; if(!emp)c.watered=false; c.t=now; }
    if(emp && c.stage===last){ if(c.crop==='tulip'){ S.tulips=S.tulips||{}; const _col=c.tulipColor||rollTulipColor(); S.tulips[_col]=(S.tulips[_col]||0)+1; } else { addStore(c.crop,Math.round(def.yield*0.6)); } delete S.crops[key]; }
  }
  // animals
  for(const type in S.animals){
    const def=ANIMALS[type];
    S.animals[type]=S.animals[type].filter(a=>{
      if(emp)a.fed=now;
      if(!emp && now-(a.fed||a.born)>2*DAY){ addLog(`☠️ 一隻${def.nm}太久沒餵死了`); return false; }
      if(def.mode==='produce'){
        if(type==='chicken' && a.species==='turkey'){ return true; }   // 火雞不產蛋
        if(type==='chicken' && def.growFeed && (a.feedCount||0)<def.growFeed){ return true; }   // 還是小雞→不生蛋
        if(type==='cow' && def.growFeed && (a.feedCount||0)<def.growFeed){ return true; }       // 還是小牛→不擠奶
        if(type==='chicken' && !emp && now-(a.fed||a.born) > EGG_HUNGER_MS){ a.lastProd=now; return true; }   // 太久沒餵→停產蛋
        const n=Math.floor((now-(a.lastProd||a.born))/def.cycle);
        if(n>0){
          a.lastProd=(a.lastProd||a.born)+n*def.cycle;
          if(type==='chicken'){
            const room=eggCap()-eggTotalPending();        // 蛋箱還能裝幾顆（滿了 room=0 → 不再生蛋）
            const add=Math.max(0,Math.min(n,room));
            if(add>0) a.pending=(a.pending||0)+add;
            if(emp && a.pending>0){ addStore('egg',Math.floor(a.pending*0.6)); a.pending=0; }
          }else{
            a.pending=(a.pending||0)+n;
            if(emp){const g=Math.floor(a.pending*0.6);if(g>0)addStore(def.prod,g);a.pending=0;}
          }
        }
      }else if(type==='pig' && def.growFeed && (a.feedCount||0)<def.growFeed){ /* 還是小豬→先養大 */ }
      else if(now-a.born>=def.cycle)a.fat=true;
      return true;
    });
  }
if(S.child && !S.child.crying && now-S.child.lastCare>CHILD_CRY_MS) S.child.crying=true;
  if(isPartnerWorking() && S.partner.job==='bake'){ const PB=20000; while(now-(S.partner.lastBake||now)>=PB){ S.partner.lastBake=(S.partner.lastBake||now)+PB; if(RECIPES[S.curRecipe]) S.cafe.goods[S.curRecipe]=(S.cafe.goods[S.curRecipe]||0)+5; } }
  if(isPartnerWorking() && S.partner.job==='rich'){ const RB=30000; while(now-(S.partner.lastBake||now)>=RB){ S.partner.lastBake=(S.partner.lastBake||now)+RB; earn(40,'伴侶的零用金'); } }
  runCafe(now);
  S.lastTick=now;
}
function baseYield(p){let y=3;if(p.qual==='good')y=Math.round(y*1.5);if(p.qual==='bad')y=Math.round(y*0.5);if(p.fert)y=Math.round(y*1.5);return Math.max(1,y);}
function resetPlot(p){p.crop=null;p.stage='empty';p.fert=false;p.qual=null;p.watered=false;}
function runCafe(now){
  if(!S.cafe.staff||S.cafe.menu.length===0){S.cafe.lastRun=now;return;}
  let days=Math.min(7,Math.floor((now-(S.cafe.lastRun||now))/DAY));
 if(days<=0)return;
  const cap=10+S.cafe.menu.length*6+decorCap()+partnerBuff('cafe')*15+cafeMateCap();
  for(let d=0;d<days;d++){
    let total=0;for(const k of S.cafe.menu)total+=(S.cafe.goods[k]||0);
    if(total<=0)continue;
    let toSell=Math.min(total,Math.round(cap*(0.6+Math.random()*0.4)));let rev=0;
    for(const k of [...S.cafe.menu].sort(()=>Math.random()-0.5)){
      if(toSell<=0)break;const av=S.cafe.goods[k]||0;const s=Math.min(av,Math.ceil(toSell/S.cafe.menu.length)+2,toSell);
      rev+=s*RECIPES[k].price;S.cafe.goods[k]-=s;toSell-=s;
    }
    rev-=20;if(rev<0)rev=0;S.cafe.till+=rev;
  }
  S.cafe.lastRun=(S.cafe.lastRun||now)+days*DAY;
}
function netWorth(){
  let n=S.cash+(S.cafe.till||0);
  for(const k in S.store)n+=(S.store[k]||0)*priceOf(k);
  for(const k in S.cafe.goods)n+=(S.cafe.goods[k]||0)*RECIPES[k].price;
  for(const t in S.animals)n+=S.animals[t].length*ANIMALS[t].cub;
  n+=S.fert*6+S.feed*1;
  return n;
}

function mapRows(){return grid().length;}
function tileAt(x,y){const g=grid();if(x<0||y<0||x>=mapCols()||y>=mapRows())return g===GRID.farm?'F':'W';return g[y][x];}
function blocked(ch){return ch==='F'||ch==='W'||ch==='B'||ch==='C'||ch==='T'||ch==='S'||ch==='A'||ch==='R'&&false;}
function walkable(tx,ty){
  const ix=Math.floor(tx),iy=Math.floor(ty);
  if(blocked(tileAt(ix,iy)))return false;
  for(const o of sceneDef().objects) if(ix===o.x&&iy===o.y) return false;
  return true;
}
function facingObject(){
  const bx=Math.round(player.x), by=Math.round(player.y), d=DIR[player.facing];
  let best=null, bestScore=Infinity;
  for(const o of sceneDef().objects){
    const dx=o.x-bx, dy=o.y-by;
    const reach=(o.sense!=null)?o.sense:SENSE;                  // 物件可自帶範圍，沒寫就用全域
    if(Math.max(Math.abs(dx),Math.abs(dy))>reach) continue;     // 在各自範圍內
    const align=dx*d.x+dy*d.y;                                   // >0 = 在面前方向
    const score=(Math.abs(dx)+Math.abs(dy))-align*0.6;           // 近的、面前的優先
    if(score<bestScore){ bestScore=score; best=o; }
  }
  return best;
}
function updateCamera(){
  let cx=player.x-VIEW_COLS/2+0.5, cy=player.y-VIEW_ROWS/2+0.5;
  cam.x=Math.max(0,Math.min(cx,mapCols()-VIEW_COLS));
  cam.y=Math.max(0,Math.min(cy,mapRows()-VIEW_ROWS));
}

/* ---------- 體重／產肉系統 ---------- */
const MEAT_SPEC={
  turkey:{ feedKg:0.6, maxKg:9,   baseKg:4,  meatPerKg:0.8,  prod:'turkey_meat' },
  pig:   { feedKg:4,   maxKg:60,  baseKg:20, meatPerKg:0.25, prod:'pork' },
  cow:   { feedKg:6,   maxKg:120, baseKg:50, meatPerKg:0.12, prod:'beef' },
};
function meatSpecFor(type,a){
  if(type==='pig') return MEAT_SPEC.pig;
  if(type==='cow') return MEAT_SPEC.cow;
  if(type==='chicken' && a && a.species==='turkey') return MEAT_SPEC.turkey;
  return null;   // 一般母雞→null（產肉固定、不顯示體重）
}
function meatYield(spec,w){ return Math.max(1, Math.round((w||spec.baseKg)*spec.meatPerKg)); }
function gainWeight(type,a){ const s=meatSpecFor(type,a); if(!s)return; a.weight=Math.min(s.maxKg,(a.weight||s.baseKg)+s.feedKg); }
function weightTxt(type,a){ const s=meatSpecFor(type,a); if(!s)return ''; const w=(a.weight||s.baseKg); return `・${w.toFixed(1)}/${s.maxKg}公斤${w>=s.maxKg?'(已肥)':''}`; }

function feedAll(type){
  const def=ANIMALS[type], list=S.animals[type]||[];
  if(!list.length){ toast(`還沒有${def.nm}`); return; }
  if(S.feed<def.feed){ toast('飼料不足'); return; }
  let fedN=0;
  for(const a of list){
    if(S.feed<def.feed) break;            // 飼料不夠→餵到這裡為止
    S.feed-=def.feed; a.fed=Date.now(); fedN++;
    if((type==='chicken'||type==='pig'||type==='cow') && def.growFeed){
      a.feedCount=(a.feedCount||0)+1;
      const turkey=type==='chicken'&&a.species==='turkey';
      if(a.feedCount===def.growFeed){
        if(type==='chicken'&&!turkey) a.lastProd=Date.now();
        if(type==='cow') a.lastProd=Date.now();
        const s=meatSpecFor(type,a); if(s) a.weight=s.baseKg;
      }else if(a.feedCount>def.growFeed){
        gainWeight(type,a);
      }
    }
  }
  if(!S.feedBowl) S.feedBowl={};
  if(fedN>0) S.feedBowl[type]=Date.now();   // 餵到任何一隻→這區飼料桶變滿
  const short = S.feed<def.feed && fedN<list.length;
  toast(`🌾 餵了 ${fedN} 隻${def.nm}${short?'（飼料不夠，剩下的沒餵到）':''}`);
  openAnimals(type); save();
}
function feed(type,idx){
  const def=ANIMALS[type]; if(S.feed<def.feed){toast('飼料不足');return;}
  S.feed-=def.feed; const a=S.animals[type][idx]; a.fed=Date.now();
  if(!S.feedBowl) S.feedBowl={};
  S.feedBowl[type]=Date.now();   // 餵了→這區（雞舍/豬圈/牛棚）的飼料盆變滿
  if((type==='chicken'||type==='pig'||type==='cow') && def.growFeed){
    a.feedCount=(a.feedCount||0)+1;
    const turkey=type==='chicken'&&a.species==='turkey';
    const youngNm=type==='chicken'?(turkey?'小火雞':'小雞'):type==='pig'?'小豬':'小牛';
    const grownNm=type==='chicken'?(turkey?'火雞':'母雞'):def.nm;
    if(a.feedCount===def.growFeed){              // 剛長大
      if(type==='chicken'&&!turkey) a.lastProd=Date.now();
      if(type==='cow') a.lastProd=Date.now();
      const s=meatSpecFor(type,a); if(s) a.weight=s.baseKg;   // 開始有體重
      toast(`🎉 ${youngNm}長大了！`);
    }else if(a.feedCount<def.growFeed){
      toast(`🌾 餵了${youngNm}（${a.feedCount}/${def.growFeed} 就會長大）`);
    }else{                                       // 成年→增重（封頂）
      gainWeight(type,a);
      const s=meatSpecFor(type,a);
      toast(s ? `🌾 餵了${grownNm}（${a.weight.toFixed(1)} 公斤）` : `🌾 餵了${grownNm}`);
    }
  }else{ toast(`🌾 餵了${def.nm}`); }
  openAnimals(type); save();
}

function collectTopEggBox(){
  const total=eggTotalPending();
  if(total<=0){ toast('目前沒有蛋'); return; }
  collectEggBox(eggBoxes()-1);   // 取最上面（最後）那一箱，按一次收一箱
}
function collectEggBox(boxIdx){
  const total=eggTotalPending();
  if(total<=0){ toast('目前沒有蛋'); return; }
  // 這箱實際有幾顆：第 boxIdx 箱（0起算）裝的範圍
  const start=boxIdx*EGG_PER_BOX;
  const inThisBox=Math.max(0, Math.min(EGG_PER_BOX, total-start));
  if(inThisBox<=0){ toast(`第 ${boxIdx+1} 箱還沒有蛋`); return; }
  // 從各隻雞的 pending 依序扣，湊滿這箱的數量
  let need=inThisBox;
  const list=S.animals.chicken||[];
  for(const a of list){
    if(need<=0) break;
    const take=Math.min(a.pending||0, need);
    if(take>0){ a.pending-=take; need-=take; }
  }
  const got=inThisBox-need;
  addStore('egg',got);
  toast(`🥚 收了第 ${boxIdx+1} 箱 ${got} 顆蛋`);
  openAnimals('chicken'); save();
}

function killBird(idx){
  const a=S.animals.chicken[idx]; if(!a) return;
  const turkey=a.species==='turkey';
  let meat,amt;
  if(turkey){ meat='turkey_meat'; amt=meatYield(MEAT_SPEC.turkey, a.weight); }   // 火雞→依體重

/* ---------- 桌上取貨：做好的先擺桌上，走過去碰到才收 ---------- */
const KITCHEN_TABLE_SLOTS=[   // 第一種在 10,14；每多一「種」往左 2 格(=32px)；最多 5 種
  {x:10,y:15},{x:8,y:15},{x:6,y:15},{x:4,y:15},{x:2,y:15},
];
const TOXIN_PER_COMPLEXITY=1;   // 毒物量 = 料理複雜度 × 這個倍率，想更毒就調大
function recipeComplexity(k){
  const r=RECIPES[k]; if(!r) return 1;
  let n=0; for(const ing in (r.ingredients||{})) n+=r.ingredients[ing];   // 食材總數
  n+=(r.knead||0);                                                        // ＋揉製次數
  return Math.max(1,n);
}
function toxinYield(k){ return Math.max(1, Math.round(recipeComplexity(k)*TOXIN_PER_COMPLEXITY)); }
function addKitchenPickup(kind, recipe, count){
  if(!S.kitchenPickups) S.kitchenPickups=[];
  const same=S.kitchenPickups.find(p=>p.kind===kind && p.recipe===recipe);   // 同款疊加在同一格
  if(same){ same.count+=count; save(); return true; }
  const slot=KITCHEN_TABLE_SLOTS.find(s=>!S.kitchenPickups.some(p=>p.x===s.x&&p.y===s.y));
  if(!slot){ return false; }   // 桌上已滿（最多 5 種），擺不下
  S.kitchenPickups.push({x:slot.x, y:slot.y, kind, recipe, count});
  save(); return true;
}
function updateKitchenPickups(){
  if(!S.kitchenPickups || !S.kitchenPickups.length) return;
  for(let i=S.kitchenPickups.length-1;i>=0;i--){
    const p=S.kitchenPickups[i];
   if(Math.hypot(player.x-p.x, player.y-p.y) <=2){   // 走到旁邊就收（範圍想大調大）
      if(p.kind==='food'){ S.cafe.goods[p.recipe]=(S.cafe.goods[p.recipe]||0)+p.count; toast(`🍰 收下 ${RECIPES[p.recipe].nm} ×${p.count}`); }
      else { S.toxins=(S.toxins||0)+p.count; toast(`🧪 收下毒物 ×${p.count}`); }
      S.kitchenPickups.splice(i,1); save();
    }
  }
}
function drawKitchenPickups(ox,oy){
  if(!S.kitchenPickups) return;
  ctx.textAlign='center'; ctx.textBaseline='middle';

    const src = p.kind==='food' ? ('food_'+p.recipe+'.png') : 'toxin.png';

    if(img && img.complete && img.naturalWidth){
      ctx.globalAlpha=1; ctx.drawImage(img, 0,0, img.naturalWidth, img.naturalHeight, cx-16, cy-22, 32,32);
    }else{
      ctx.font='16px serif'; ctx.fillStyle='#000';
      ctx.fillText(p.kind==='food'?RECIPES[p.recipe].e:'🧪', cx, cy-6);
    }
  
  }
}
/* 用料台內容＋揉次＋烤秒數，比對找出符合的食譜（找不到回 null） */
function matchRecipe(t){
  for(const k in RECIPES){
    const r=RECIPES[k];
    const need=r.ingredients||{};
    // 1. 料台食材種類數要一樣
    if(slotsUsed()!==Object.keys(need).length) continue;
    // 2. 每種數量要剛好對
    let ok=true;
    for(const ing in need){ if((prep.slots[ing]||0)!==need[ing]){ ok=false; break; } }
    if(!ok) continue;
    // 3. 揉製次數要夠
    if(prep.knead<(r.knead??4)) continue;
    // 4. 烤秒數要對（±1.5秒）
    const bm=r.bakeMs||BAKE_MS;
    if(Math.abs(t-bm)>1500) continue;
    return k;   // 全部符合
  }
  return null;
}
function finishBake(t){
  prep.inOven=false;
  if(t>BURN_MS){ toast('💀 燒焦了！這批報廢'); prep.slots={}; prep.knead=0; save(); return; }
  const k=matchRecipe(t);   // 用料台內容＋烤秒數找出是哪道
  if(!k){ toast('這不像任何一道食譜，報廢了'); prep.slots={}; prep.knead=0; save(); return; }
  const r=RECIPES[k];
  if(S.cookBy==='partner' && S.partner){
    const out=Math.round(r.batch*cookBatchMul());
    if(addKitchenPickup('food', k, out)) toast(`出爐 ${out} 個${r.nm}，擺到桌上了`);
    else { S.cafe.goods[k]=(S.cafe.goods[k]||0)+out; toast(`出爐 ${out} 個${r.nm}（直接收進背包）`); }
  } else {
    const out=toxinYield(k);
    if(addKitchenPickup('toxin', k, out)) toast(`做出 ${out} 份毒物，擺到桌上了`);
    else { S.toxins=(S.toxins||0)+out; toast(`做出 ${out} 份毒物（直接收進背包）`); }
  }
  if(!S.recipesCooked) S.recipesCooked={};
  S.recipesCooked[k]=true;
  prep.slots={}; prep.knead=0; save();
}

function showDlg(o){document.getElementById('dialogue').classList.remove('idle');

function childWalkLines(){
  if(!S.child) return CHILD_GONE_LINES;
  const key=CHILD_STAGES[S.child.stage].key;                 // baby / toddler / child / teen
  if(key==='baby') return CHILD_BABY_LINES;
  if(S.partner){
    if(partnerHoneymoon() && typeof CHILD_SETTLING_LINES!=='undefined' && CHILD_SETTLING_LINES[key])
      return CHILD_SETTLING_LINES[key];                       // 同居初期：孩子還在觀望，先不排斥
    const byStage=CHILD_PARTNER_LINES[key] || CHILD_PARTNER_LINES.child;
    return byStage[S.partner.id] || byStage._default;
  }
  return CHILD_HAPPY_LINES;
}
function partnerHoneymoon(){ return !!(S.partner && (S.partner.newlyMoved||0)>0); }
function partnerWalkLines(){
  const p=S.partner; if(!p) return ['…'];
  const set=(typeof PARTNER_WALK_LINES!=='undefined' && (PARTNER_WALK_LINES[p.id]||PARTNER_WALK_LINES._default))
            || {base:['和你在一起真好。']};
  if(partnerHoneymoon() && set.newlyMoved && set.newlyMoved.length){   // 剛同居：先放幾次「搬進來」台詞
    if(p.newlyMoved>0){ p.newlyMoved--; save(); }
    return set.newlyMoved;
  }
  let pool=(set.base||[]).slice();
  if(S.child && S.child.stage>=1 && set.jealous) pool=pool.concat(set.jealous);  // 阿爾弗雷德到幼兒以上才摻心事
  return pool.length?pool:['…'];
}

if(walkable(nx+0.5,player.y+foot))player.x=nx;

 function makeSwimmer(){
  const isCursed=Math.random()<CURSED_CHANCE;
  const isTrash=isCursed || Math.random()<TRASH_RATE;
  const kind=isCursed ? CURSED : (isTrash ? TRASH_KINDS[(Math.random()*TRASH_KINDS.length)|0] : pickFishKind());
  const dir=Math.random()<0.5?-1:1;
  return { kind, trash:isTrash, dir, x: dir>0? -20 : FISH_W+20,
    y: FISH_TOP + Math.random()*(FISH_BOTTOM-FISH_TOP),
    wob: Math.random()*Math.PI*2, hooked:false };
}

    <div class="row"><div class="e">🪝</div><div class="info"><div class="d">碰到的魚＆垃圾會一起掛上來；魚越重收得越慢</div></div></div>
    <div class="row"><div class="e">🗑️</div><div class="info"><div class="d">垃圾送進船裡會扣錢</div></div></div>
    <div class="row"><div class="e">⚔️</div><div class="info"><div class="d">攻擊鈕打登船海怪（自動瞄準）</div></div></div>
    <button class="btn green" style="width:100%;margin-top:10px" onclick="closeSheet();enterFishing()">⚓ 出航！</button>`);
}

function enterFishing(){
  fish={ capX:160, facing:'right',
    hookDepth:0, hv:0, hookX:160, hvx:0, hooked:[],
    swimmers:[], airborne:[], bullets:[], monsters:[],
    boatHp:FISH_BOAT_MAXHP, score:0, caught:0, boatX:0,
    lastAtk:0, lastMonster:Date.now()+3000, knifeSwing:0, bob:0, over:false };
  for(let i=0;i<SWIM_CAP;i++) fish.swimmers.push(makeSwimmer());
  curScene='fishing';
  PLAYER_IMG.src='captain.png';   // 出海自動換上船長服
  document.getElementById('sceneTitle').textContent='🎣 外海捕魚';
  document.getElementById('fishUI').style.display='block';
  const fw=document.getElementById('fishWeaponBtn'); fw.style.display='flex';
  document.getElementById('equipBtn').style.display='none';
  document.getElementById('actBtn').className='actbtn';
  const h=document.getElementById('hint'); if(h) h.classList.remove('show');

function actDown(ev){ if(ev)ev.preventDefault(); if(curScene==='fishing'){ held.rod=true; return; } interact(ev); }
function actUp(){ held.rod=false; }
function weaponBtn(ev){ if(ev)ev.preventDefault(); if(curScene==='fishing'){ fishAttack(); return; } toggleEquip(ev); }

function fishAttack(){
  if(!fish||fish.over) return;
  const now=Date.now(); if(now-fish.lastAtk<ATK_CD) return; fish.lastAtk=now;
  let target=null, best=1e9;
  for(const m of fish.monsters){ const d=Math.abs(m.x-fish.capX); if(d<best){best=d;target=m;} }
  if(target) fish.facing = target.x<fish.capX ? 'left':'right';
  fish.knifeSwing=8;   // 每次攻擊都切換拿槍造型
  const dir=fish.facing==='left'?-1:1;
  if(target && best<=KNIFE_RANGE){ fish.knifeSwing=8; target.hit=6; target.hp-=KNIFE_DMG;
    if(target.hp<=0) killMonster(fish.monsters.indexOf(target)); }
  else fish.bullets.push({ x:fish.capX+dir*16, dir });
}
function killMonster(j){ if(j<0) return; fish.monsters.splice(j,1);
  earn(8,'擊退海怪'); refreshTop(); save(); toast('💥 擊退一隻海怪 +$8'); }

function landCatch(a){
  if(a.kind.cursed){ triggerCurse(); return; }
  if(a.trash){
    const dmg=Math.abs(a.kind.val);                         // 用垃圾原本的「價值」當傷害
    fish.boatHp=Math.max(0, fish.boatHp-dmg);
    toast(`🗑️ ${a.kind.nm}撞上船 -${dmg}🚢`);
    if(fish.boatHp<=0){ sinkBoat(); return; }
    refreshTop(); save(); return;                           // 垃圾不入帳、不入庫，到此為止
  }
  else{ const f=a.kind; fish.caught++;
    addStore(f.k,1);                                   // 🐟 入背包（之後可做料理／賣）
    S.fishLog=S.fishLog||{}; S.fishLog[f.k]=(S.fishLog[f.k]||0)+1;
    toast(`🎣 ${f.rar}・${f.nm} 入背包！`); }
  refreshTop(); save();
}

function sinkBoat(){ if(!fish) return; fish.over=true; toast('🌊 船快沉了！緊急靠岸'); setTimeout(()=>landBoat(),1000); }
function landBoat(){
  if(!fish){ goScene('port'); return; }
  const net=fish.score, n=fish.caught, log=Object.assign({},S.fishLog||{});
  fish=null; goScene('port'); refreshTop();
  const rows=FISH_KINDS.map(f=>`<div class="row"><div class="e">${f.e}</div><div class="info">
    <div class="n">${f.nm} <span class="small" style="color:${RAR_COL[f.rar]}">${f.rar}</span></div>
    <div class="d">累計釣獲 ${log[f.k]||0} 條・每條 $${f.val}・重量 ${f.wt}</div></div></div>`).join('');
  openSheet(`<div class="sheethead"><h3>🎣 出航結算</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <p>這趟送進船 <b>${n}</b> 條魚，本趟淨收益 <b class="${net>=0?'up':'down'}">$${fmt(net)}</b>（已即時入帳）。</p>
    <div class="hr"></div>${rows}
    <button class="btn green" style="width:100%;margin-top:10px" onclick="closeSheet();askSail()">⛵ 再出航一次</button>`);
}
function triggerCurse(){
  if(!fish) return;
  fish.over=true;                 // 停掉這趟的更新
  fish=null;                      // 結束捕魚狀態
  goScene('office');              // 回辦公室（會自動把 fishUI 收起來）
  // 躺到床範圍內、腳下可走的格子（跟 faint 一樣）
  let bx=Math.round((BED.x1+BED.x2)/2), by=BED.y2;
  for(let y=BED.y2;y>=BED.y1;y--) for(let x=BED.x1;x<=BED.x2;x++){
    if(walkable(x+0.5,y+0.5)){ bx=x; by=y; }
  }
  player.x=bx; player.y=by;
  sleeping=true;
  save();
  setTimeout(()=>toast('🪆 你釣起了不該碰的東西……回過神已躺在床上。'), 300);
}
/* ---------- 每楨邏輯 ---------- */
function updateFishing(){
  if(!fish){ enterFishing(); return; }
  if(fish.over) return;
  const now=Date.now();
  fish.bob=Math.sin(now/420)*2;
  fish.boatX=Math.sin(now/2200)*14;
  const boatX=fish.boatX;
  if(fish.knifeSwing>0) fish.knifeSwing--;

  if(held.left){ fish.capX=Math.max(CAP_MIN, fish.capX-CAP_SPEED); fish.facing='left'; }
  if(held.right){ fish.capX=Math.min(CAP_MAX, fish.capX+CAP_SPEED); fish.facing='right'; }

  // 線上總重量
  let load=0; for(const h of fish.hooked) load+=(h.kind.wt||1);

  // 垂直：重力下沉；按鈕收線(重量越大收越慢)。鉤子最高只到竿邊，不衝上天
  const reeling=(held.rod||held.up);
  fish.hv += ROD_GRAV*(1+load*LOAD_SINK);
  if(reeling)  fish.hv -= ROD_LIFT/(1+load*LOAD_SLOW);   // 上鍵／拉竿鈕：收線往上拉
  if(held.down) fish.hv += ROD_LIFT*0.7;                  // 下鍵：主動把魚鉤放下去
  fish.hv *= ROD_DAMP;
  fish.hookDepth += fish.hv;
  const maxD=FISH_BOTTOM-FISH_SURFACE, minD=-56;   // minD≈竿邊高度（收到竿子就停）
  if(fish.hookDepth>maxD){ fish.hookDepth=maxD; if(fish.hv>0) fish.hv=0; }
  if(fish.hookDepth<minD){ fish.hookDepth=minD; if(fish.hv<0) fish.hv=0; }

  // 水平：水裡鬆鬆地自由飄；一收線/出水就把線收緊、鉤子乖乖回到竿下
  const pivotX=fish.capX+boatX+(fish.facing==='left'?-16:16);
  const shallow=fish.hookDepth<24, tight=reeling||shallow;
  const springK = tight ? REEL_SPRING : HOOK_SPRING/(1+fish.hookDepth*0.01);
  fish.hvx += (pivotX-fish.hookX)*springK;
  if(!tight && fish.hookDepth>4) fish.hvx += Math.sin(now/650)*CUR_PUSH + Math.sin(now/1700)*CUR_PUSH*0.6;
  if(held.left)  fish.hvx -= HOOK_NUDGE;
  if(held.right) fish.hvx += HOOK_NUDGE;
  fish.hvx *= tight ? REEL_DAMP : HOOK_DAMP;
  fish.hookX += fish.hvx;
  fish.hookX=Math.max(8, Math.min(FISH_W-8, fish.hookX));

  const hookX=fish.hookX, hookY=FISH_SURFACE+fish.hookDepth;

  // 收線把魚拉過船緣 → 輕輕送進船裡（在這之前魚一直被線牽著）
  if(fish.hooked.length && hookY <= DECK_Y-6){
    const boatCx=(BX0+BX1)/2+boatX;
    for(let k=0;k<fish.hooked.length;k++){
      const s=fish.hooked[k];
      fish.airborne.push({ kind:s.kind, trash:s.trash, x:hookX, y:hookY,
      vx:(boatCx-hookX)*0.04 + fish.hvx*0.45 + (Math.random()-0.5)*0.9, vy:-PLOP_UP-k*0.45, spin:0 });
      const i=fish.swimmers.indexOf(s); if(i>=0) fish.swimmers[i]=makeSwimmer();
    }
    fish.hooked=[];
  }

  // 水裡碰到的魚／垃圾→掛上（不限一隻）
  if(fish.hookDepth>3 && fish.hooked.length<HOOK_CAP){
    for(const s of fish.swimmers){
      if(s.hooked) continue;
      if(Math.abs(s.x-hookX)<11 && Math.abs(s.y-hookY)<11){
        s.hooked=true; fish.hooked.push(s);
        if(fish.hooked.length===1) say(s.trash?'呃，掛到垃圾了…':'上鉤了！按住收線把牠拉上船');
      }
    }
  }
  // 掛著的排成一串跟著鉤子（這就是「魚被線牽著」）
  fish.hooked.forEach((s,k)=>{ s.x=hookX+Math.sin(now/200+k)*2; s.y=hookY+6+k*7; });

  // 魚群／垃圾游動
  for(const s of fish.swimmers){
    if(s.hooked) continue;
    s.x += s.dir*(s.kind.spd||0.6); s.wob+=0.05; s.y += Math.sin(s.wob)*0.3;
    if(s.y<FISH_TOP) s.y=FISH_TOP; if(s.y>FISH_BOTTOM) s.y=FISH_BOTTOM;
    if(s.x<-30||s.x>FISH_W+30) Object.assign(s, makeSwimmer());
  }
  while(fish.swimmers.length<SWIM_CAP) fish.swimmers.push(makeSwimmer());

  // 送進船的漁獲：小拋物線落到甲板計分/扣錢
  for(let i=fish.airborne.length-1;i>=0;i--){
    const a=fish.airborne[i];
    a.vy+=AIR_G; a.x+=a.vx; a.y+=a.vy; a.spin+=0.25;
    if(a.vy>0 && a.y>=DECK_Y && a.x>(BX0+boatX+8) && a.x<(BX1+boatX-8)){
      landCatch(a);
      if(!fish) return;            // 詛咒物觸發→fish 已清空，立刻收手別再碰 fish
      fish.airborne.splice(i,1); continue;
    }
    if(a.y>FISH_H+30){ if(!a.trash) toast('💦 魚滑回海裡了…'); fish.airborne.splice(i,1); }
  }

  // 海怪
  if(fish.monsters.length<MON_CAP && now>fish.lastMonster){
    fish.lastMonster=now+MON_MIN+Math.random()*(MON_MAX-MON_MIN);
    fish.monsters.push({ x:CAP_MIN+Math.random()*(CAP_MAX-CAP_MIN), hp:MON_HP, born:now, lastBite:now+900, frame:0, hit:0 });
    toast('🐙 海怪登船了！快攻擊牠！');
  }
  for(const m of fish.monsters){
    m.frame=Math.floor(now/240)%2; if(m.hit>0) m.hit--;
    if(now-m.lastBite>=MON_BITE_CD){ m.lastBite=now; fish.boatHp=Math.max(0,fish.boatHp-MON_DMG);
      if(fish.boatHp<=0){ sinkBoat(); return; } }
  }
  for(let i=fish.bullets.length-1;i>=0;i--){
    const b=fish.bullets[i]; b.x+=b.dir*BULLET_SPEED;
    let gone=(b.x<-6||b.x>FISH_W+6);
    for(let j=fish.monsters.length-1;j>=0;j--){
      const m=fish.monsters[j];
      if(Math.abs(m.x-b.x)<18){ m.hp-=GUN_DMG; m.hit=6; gone=true; if(m.hp<=0) killMonster(j); break; }
    }
    if(gone) fish.bullets.splice(i,1);
  }

  // 更新 HTML HUD（血條 + 計分）
  const hpFill=document.getElementById('fishHpFill');
  if(hpFill){
    const pct=Math.max(0,fish.boatHp)/FISH_BOAT_MAXHP*100;
    hpFill.style.width=pct+'%';
    hpFill.style.background = fish.boatHp>40?'#6fae5e':(fish.boatHp>15?'#d6a93e':'#c2503e');
  }
  const sc=document.getElementById('fishScore');
  if(sc){
    let txt='🎣'+fish.caught+'　$'+fish.score;
    if(fish.hooked.length){ let load=0; for(const h of fish.hooked) load+=(h.kind.wt||1);
      txt+='　🪝×'+fish.hooked.length+'（重'+load.toFixed(1)+'）'; }
    sc.textContent=txt;
  }
}

/* ---------- 每楨繪圖 ---------- */
function drawFishing(){
  if(!fish){ enterFishing(); }
  const now=Date.now(), boatX=fish.boatX||0;
  const deck=DECK_Y, px=fish.capX+boatX;
 // 天空＋海＋波紋
  let sky=ctx.createLinearGradient(0,0,0,FISH_SURFACE);
  sky.addColorStop(0,'#bfe0ea'); sky.addColorStop(1,'#e9f3ee');
  ctx.fillStyle=sky; ctx.fillRect(0,0,FISH_W,FISH_SURFACE);
  let sea=ctx.createLinearGradient(0,FISH_SURFACE,0,FISH_H);
  sea.addColorStop(0,'#58CCB9'); sea.addColorStop(0.5,'#0E8A93');sea.addColorStop(1,'#1f5d77');
  ctx.fillStyle=sea; ctx.fillRect(0,FISH_SURFACE,FISH_W,FISH_H-FISH_SURFACE);
  ctx.strokeStyle='#ffffff55'; ctx.lineWidth=2;
  for(let x=0;x<FISH_W;x+=24){ ctx.beginPath();
    ctx.moveTo(x,FISH_SURFACE+2+Math.sin(x+now/200)*1.5);
    ctx.lineTo(x+12,FISH_SURFACE+2+Math.sin(x+12+now/200)*1.5); ctx.stroke(); }
// 背景雲（全幅，最底層）
  { const bg=npcImg('bg.png');
    if(bg && bg.complete && bg.naturalWidth) ctx.drawImage(bg, 0, 0);
    else { /* 沒圖才畫程式的天空海 */ } }
  // ① 船帆（背景，全幅）
  { const sm=npcImg('sail.png');
    if(sm && sm.complete && sm.naturalWidth) ctx.drawImage(sm, Math.round(boatX), 0); }

  // ② 船身（全幅；沒圖退回向量）
  const boatImg=npcImg('boat.png');
  if(boatImg && boatImg.complete && boatImg.naturalWidth){
    ctx.drawImage(boatImg, Math.round(boatX), 0);
  }else{
    const bx0=BX0+boatX, bx1=BX1+boatX;
    ctx.fillStyle='#7a5230';
    ctx.beginPath(); ctx.moveTo(bx0,deck); ctx.lineTo(bx1,deck);
    ctx.lineTo(bx1-22,FISH_SURFACE+18); ctx.lineTo(bx0+22,FISH_SURFACE+18); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8a6038'; ctx.fillRect(bx0,deck-6,bx1-bx0,8);
    ctx.fillStyle='#5e3f24'; ctx.fillRect(bx0,deck+2,bx1-bx0,3);
  }

  // 釣竿（畫在人後面、位置稍低）
  const rodTipX=px+(fish.facing==='left'?-16:16), rodTipY=deck-52;
  ctx.strokeStyle='#b08a3a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px,deck-12); ctx.lineTo(rodTipX,rodTipY); ctx.stroke();

  // ③ 船長（夾在船身與前景裝飾中間）
  const py=deck-2+fish.bob*0.3;
  const dirCols={ down:0, left:1, right:2, up:3 }, col=dirCols[fish.facing]||2;
  const bodyImg = (fish.knifeSwing>0 && CAPTAIN_GUN_IMG.complete && CAPTAIN_GUN_IMG.naturalWidth)
    ? CAPTAIN_GUN_IMG : PLAYER_IMG;
  if(bodyImg.complete && bodyImg.naturalWidth){
    ctx.drawImage(bodyImg, col*64,0,64,64, px-32, py-64+14, 64,64);
  }else{ ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🧑‍✈️',px,py); }

  // ④ 船上裝飾（前景，全幅，蓋在人前面）
  { const dm=npcImg('deck.png');
    if(dm && dm.complete && dm.naturalWidth) ctx.drawImage(dm, Math.round(boatX), 0); }

  // ⑤ 魚（在 deck 之上）
  for(const s of fish.swimmers) drawOneFish(s);
  for(const s of fish.hooked)   drawOneFish(s);

  // ⑥ 魚線＋鉤（在 deck 之上；釣竿已畫在人後面了）
  const hookX=fish.hookX, hookY=FISH_SURFACE+fish.hookDepth;
  ctx.strokeStyle='#eef6f8cc'; ctx.lineWidth=1.2;
  const spanX=Math.abs(hookX-rodTipX);
  const cx=(rodTipX+hookX)/2 + Math.sin(now/500)*3;
  const cy=(rodTipY+hookY)/2 + 10 + spanX*0.25;
  ctx.beginPath(); ctx.moveTo(rodTipX,rodTipY); ctx.quadraticCurveTo(cx,cy,hookX,hookY); ctx.stroke();
  ctx.strokeStyle='#dfe6ea'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(hookX,hookY+2,2.5,0,Math.PI*1.5); ctx.stroke();

  // ⑦ 飛魚／海怪／子彈／刀光
  for(const a of fish.airborne) drawItem(a.kind,a.trash,a.x,a.y,a.vx<0,a.spin);
  for(const m of fish.monsters) drawMonster(m, now, boatX);
  ctx.fillStyle='#ffd24a';
  for(const b of fish.bullets) ctx.fillRect(b.x+boatX-4,deck-18,8,3);
  if(fish.knifeSwing>0){ const dir=fish.facing==='left'?-1:1; ctx.strokeStyle='#ffffffcc'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px+dir*18,deck-24,20, dir>0?-0.8:2.3, dir>0?0.8:3.9); ctx.stroke(); }

 
}

function drawItem(kind,trash,x,y,flip,spin){
  ctx.save(); ctx.translate(x,y); if(spin) ctx.rotate(spin);
  if(trash){
    const tim = npcImg('trash_'+kind.k+'.png');
    if(tim && tim.complete && tim.naturalWidth){ if(flip && kind.k!=='tire') ctx.scale(-1,1); ctx.drawImage(tim, -tim.naturalWidth/2, -tim.naturalHeight/2); }
    else { ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(kind.e,0,0); }
  }
  else{
    const im = kind.k && FISH_IMG[kind.k] ? npcImg(FISH_IMG[kind.k]) : null;
    if(im && im.complete && im.naturalWidth){              // 有貼圖：原尺寸置中畫，朝左自動翻
      if(flip) ctx.scale(-1,1);
      ctx.drawImage(im, -im.naturalWidth/2, -im.naturalHeight/2);
    }else{                                                  // 沒貼圖：退回向量魚
      const L=kind.len; if(flip) ctx.scale(-1,1);
      ctx.fillStyle=kind.col;
      ctx.beginPath(); ctx.moveTo(-L*0.5,0); ctx.lineTo(-L*0.5-6,-5); ctx.lineTo(-L*0.5-6,5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,0,L*0.5,L*0.32,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(L*0.28,-2,1.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(L*0.30,-2,0.9,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}
function drawOneFish(s){
  drawItem(s.kind, s.trash, s.x, s.y, s.dir<0, 0);
  if(s.hooked){ const L=s.kind.len||14; ctx.strokeStyle='#fff'; ctx.globalAlpha=0.4+0.4*Math.sin(Date.now()/120); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(s.x,s.y,L*0.6,L*0.45,0,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
}
function drawMonster(m, now, boatX){
  const grow=Math.min(1,(now-m.born)/400), bob=Math.sin(now/300+m.x)*3;
  const mx=m.x+(boatX||0), my=DECK_Y-14+bob;
  const ci=npcImg('cthulhu.png');
  ctx.save(); ctx.translate(mx,my); ctx.scale(grow,grow);
if(ci && ci.complete && ci.naturalWidth){
    ctx.drawImage(ci, m.frame*64,0, 64,64, -32, -64+24, 64, 64);
  }else{
    const t=m.frame?4:-4; ctx.fillStyle = m.hit>0 ? '#e8e36a' : '#4f6e4a'; ctx.lineWidth=3; ctx.strokeStyle=ctx.fillStyle;
    for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*5,4); ctx.quadraticCurveTo(i*7,16, i*6+(i%2?t:-t),24); ctx.stroke(); }
    ctx.beginPath(); ctx.ellipse(0,0,15,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5d24a'; ctx.beginPath(); ctx.arc(-5,-2,3.2,0,Math.PI*2); ctx.arc(5,-2,3.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-5,-2,1.4,0,Math.PI*2); ctx.arc(5,-2,1.4,0,Math.PI*2); ctx.fill();

  for(const c in TULIP_COLORS){ r-=TULIP_COLORS[c].w; if(r<=0) return c; }

  const pool=['N','N','N','R','R','R','SR','SR','SSR'];   // 抽中機率
  S.tulipDay={}; S.tulipPx={};
  for(const c in TULIP_COLORS){
    const tier=pool[(Math.random()*pool.length)|0];
    S.tulipDay[c]=tier;
    S.tulipPx[c]=Math.round(TULIP_TIERS[tier].base*(0.85+Math.random()*0.30));
  }
  // 保證每天至少有一色 SR 以上
  const cs=Object.keys(TULIP_COLORS);
  if(!cs.some(c=>S.tulipDay[c]==='SR'||S.tulipDay[c]==='SSR')){
    const c=cs[(Math.random()*cs.length)|0];
    S.tulipDay[c]='SR'; S.tulipPx[c]=Math.round(TULIP_TIERS.SR.base*(0.85+Math.random()*0.30));

}

function openFoodTable(tbl){
  tbl=tbl||'table1';
  const T=FOOD_TABLES[tbl]; if(!T) return;
  const placed=tablePlaced(tbl), cap=T.slots.length;
  const used=placed.filter(Boolean).length;
  const bag=[]; for(const k in S.cafe.goods){ if(S.cafe.goods[k]>0 && RECIPES[k]) bag.push(k); }
  const bagBody = bag.length ? bag.map(k=>{ const r=RECIPES[k];
    return `<div class="row"><div class="e">${dishIcon(k)}</div><div class="info"><div class="n">${r.nm} <span class="small">×${S.cafe.goods[k]}</span></div></div>
      <button class="btn sm ${used>=cap?'dis':'green'}" onclick="placeFood('${tbl}','${k}')">擺上桌</button></div>`;
  }).join('') : '<div class="empty-note">沒有加工成品，先去廚房做。</div>';
  const placedBody = placed.map((k,i)=> k?`<div class="row"><div class="e">${dishIcon(k)}</div>
      <div class="info"><div class="n">${RECIPES[k]?RECIPES[k].nm:k}</div></div>
      <button class="btn sm" onclick="takeFood('${tbl}',${i})">收回</button></div>`:'').join('');
  openSheet(`<div class="sheethead"><h3>🍱 擺盤（桌上 ${used}/${cap}）</h3><button class="close" onclick="closeSheet()">✕</button></div>
    ${placed.some(Boolean)?`<b class="small">這張桌上的成品</b>${placedBody}<div class="hr"></div>`:''}
    <b class="small">加工成品</b>${bagBody}`);
}
function placeFood(tbl,k){
  const T=FOOD_TABLES[tbl]; if(!T) return;
  const placed=tablePlaced(tbl);
  if((S.cafe.goods[k]||0)<=0){ toast('沒有這個成品'); return; }
  let slot=-1; for(let i=0;i<T.slots.length;i++){ if(!placed[i]){ slot=i; break; } }
  if(slot<0){ toast('這張桌子滿了'); return; }
  placed[slot]=k; S.cafe.goods[k]--; toast(`擺上 ${RECIPES[k]?RECIPES[k].nm:k}`);
  openFoodTable(tbl); save();
}
function takeFood(tbl,i){
  const placed=tablePlaced(tbl);
  const k=placed[i]; if(!k) return;
  S.cafe.goods[k]=(S.cafe.goods[k]||0)+1; placed[i]=null;
  toast(`收回 ${RECIPES[k]?RECIPES[k].nm:k}`); openFoodTable(tbl); save();
}

const APPLE_DROP_ZONE={x1:15,y1:6,x2:18,y2:7};   // 蘋果掉落範圍（格座標）
const APPLE_TREE_CD=60000;   // 搖完要等多久才能再搖（毫秒）；想不限次就改成 0
const APPLE_PICK_RANGE=1.2;  // 走多近會自動撿（格），想更好撿就調大
function shakeAppleTree(){
  const now=Date.now();
  const left=APPLE_TREE_CD-(now-(S.appleTreeTs||0));
  if(left>0){ toast(`🍎 樹上的蘋果還沒長好（約 ${fmtSec(left)}）`); return; }
  S.appleTreeTs=now;
  if(!S.appleDrops) S.appleDrops=[];
  const z=APPLE_DROP_ZONE, n=1+Math.floor(Math.random()*3);   // 1~3 顆
  for(let i=0;i<n;i++){
    let x,y,tries=0;
    do{ x=z.x1+Math.floor(Math.random()*(z.x2-z.x1+1)); y=z.y1+Math.floor(Math.random()*(z.y2-z.y1+1)); tries++; }
    while(x===18 && y===5 && tries<10);   // 別掉在樹幹那格
    S.appleDrops.push({x,y});
  }
  toast(`🍎 搖下了 ${n} 顆蘋果！走過去撿起來`); save();
}
function updateAppleDrops(){
  if(!S.appleDrops || !S.appleDrops.length) return;
  for(let i=S.appleDrops.length-1;i>=0;i--){
    const a=S.appleDrops[i];
    if(Math.hypot(player.x-a.x, player.y-a.y) <= APPLE_PICK_RANGE){
      addStore('apple',1); toast('🍎 撿到蘋果 ×1');
      S.appleDrops.splice(i,1); save();
    }
  }
}
function drawAppleDrops(ox,oy){
  if(!S.appleDrops) return;
  const img=npcImg('apple.png');
  for(const a of S.appleDrops){
    const cx=a.x*TS+TS/2-ox, cy=a.y*TS+TS/2-oy;
    ctx.globalAlpha=1; ctx.fillStyle='#00000022';
    ctx.beginPath(); ctx.ellipse(cx,cy+0,5,3,0,0,Math.PI*2); ctx.fill();
    if(img && img.complete && img.naturalWidth){
      ctx.drawImage(img, 0,0, img.naturalWidth, img.naturalHeight, cx-8, cy-12, 16,16);
    }else{
      ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍎', cx, cy);
    }
  }
}

/* ===================== 🧀 乳品加工處（牛奶→乳酪＋奶油） ===================== */
/* 玩法：放牛奶進去，等一段時間自動變成乳酪和奶油，收回後可當料理食材。
   要調平衡只改下面這張表，其他都不用動。 */
const DAIRY={
  inMilk: 2,                    // 每批投入幾瓶牛奶
  ms: 30000,                    // 一批加工時間（毫秒）
  out: { cheese:1, butter:1 },  // 一批產出（key 要對到 PRODUCTS）
  cap: 4,                       // 最多同時加工幾批
};
function dairyOutTxt(){
  return Object.keys(DAIRY.out).map(k=>`${prodIcon(k,18)}${PRODUCTS[k].nm}${DAIRY.out[k]}`).join('・');
}
function tickDairy(now){
  if(!S) return;
  if(!S.dairy) S.dairy={batches:[],ready:{}};
  if(!S.dairy.batches) S.dairy.batches=[];
  if(!S.dairy.ready)   S.dairy.ready={};
  for(let i=S.dairy.batches.length-1;i>=0;i--){
    if(now-S.dairy.batches[i].startTs>=DAIRY.ms){           // 這批做好了
      for(const k in DAIRY.out) S.dairy.ready[k]=(S.dairy.ready[k]||0)+DAIRY.out[k];
      S.dairy.batches.splice(i,1);
    }
  }
}
function openDairy(){
  if(!S.dairy) S.dairy={batches:[],ready:{}};
  tickDairy(Date.now());                                    // 先結算，畫面才即時
  const milk=S.store.milk||0, proc=S.dairy.batches.length;
  const rc=S.dairy.ready.cheese||0, rb=S.dairy.ready.butter||0, hasReady=rc>0||rb>0;
  let procTxt='';
  if(proc>0){
    const now=Date.now();
    const t=S.dairy.batches.map(b=>Math.max(0,DAIRY.ms-(now-b.startTs))).sort((a,b)=>a-b);
    procTxt=`<div class="small" style="margin-bottom:8px">${prodIcon('milk',18)} 加工中 ${proc}/${DAIRY.cap} 批・最快還要 ${fmtSec(t[0])}</div>`;
  }
  const canPut = milk>=DAIRY.inMilk && proc<DAIRY.cap;
  openSheet(`<div class="sheethead"><h3>${prodIcon('cheese',24)} 乳品加工處</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="small" style="margin-bottom:8px">把牛奶放進去，等一會兒就會變成乳酪和奶油。<br>${prodIcon('milk',18)} 牛奶庫存 ${milk}</div>
    ${procTxt}
    ${hasReady?`<button class="btn green" style="width:100%;margin-bottom:8px" onclick="collectDairy()">🧺 取出成品（${prodIcon('cheese',18)}${rc}・${prodIcon('butter',18)}${rb}）</button>`:''}
    <button class="btn ${canPut?'':'dis'}" style="width:100%" onclick="putMilkDairy()">${prodIcon('milk',18)} 投入 ${DAIRY.inMilk} 牛奶 → ${fmtSec(DAIRY.ms)}後得 ${dairyOutTxt()}</button>`);
}
function putMilkDairy(){
  if(!S.dairy) S.dairy={batches:[],ready:{}};
  if(S.dairy.batches.length>=DAIRY.cap){ toast('加工槽滿了，等做好再放'); return; }
  if((S.store.milk||0)<DAIRY.inMilk){ toast('牛奶不夠'); return; }
  S.store.milk-=DAIRY.inMilk;
  S.dairy.batches.push({startTs:Date.now()});
  toast(`🥛 放入 ${DAIRY.inMilk} 牛奶，開始加工`);
  openDairy(); save();
}
function collectDairy(){
  if(!S.dairy) return;
  const r=S.dairy.ready||{}; let got=0; const msg=[];
  for(const k in r){ if(r[k]>0){ addStore(k,r[k]); msg.push(`${PRODUCTS[k].e}${PRODUCTS[k].nm}${r[k]}`); got+=r[k]; } }
  if(!got){ toast('還沒有成品'); return; }
  S.dairy.ready={};
  toast(`🧺 取出 ${msg.join('・')}`);
  openDairy(); save();
}

const ITEM_IMG_SRC={

const ANIMAL_ICON_SRC={
  chick:'icon_chick.png', hen:'icon_hen.png', turkey:'icon_turkey.png',

  calf:'icon_calf.png', cow:'icon_cow.png',

function _imgTag(src,e,px){ px=px||32;
  return `<img src="${src}" style="width:${px}px;height:${px}px;object-fit:contain;image-rendering:pixelated;vertical-align:middle" onerror="this.outerHTML='${e}'">`;
}
/* 作物圖示＝生長圖第六格，用 CSS 裁切（背景縮到高度=px，每格剛好 px 寬，往左推 5 格） */
function cropIcon(k,px){ px=px||32; const d=FARM_CROPS[k]; if(!d) return '';
  return `<div style="display:inline-block;width:${px}px;height:${px}px;background:url('${d.img}') ${-5*px}px 0 no-repeat;background-size:auto ${px}px;image-rendering:pixelated;vertical-align:middle"></div>`;
}
/* 通用物品（作物/產品/魚/咖啡材料 都走這個） */
function prodIcon(k,px){
  if(FARM_CROPS[k]) return cropIcon(k,px);                       // 作物→第六格
  const src=ITEM_IMG_SRC[k]||FOOD_IMG_SRC[k];
  const e=(PRODUCTS[k]&&PRODUCTS[k].e)||(EXTRAS[k]&&EXTRAS[k].e)||'📦';
  return src ? _imgTag(src,e,px) : e;
}
function miscIcon(key,e,px){ const src=MISC_IMG_SRC[key]; return src?_imgTag(src,e,px):e; }
/* 動物：傳 (type,a) 自動判斷幼/成；或直接傳字串 key 指定（如 'turkey'） */
function animalIcon(type,a,px){
  if(typeof a==='string'){ const e={chick:'🐤',hen:'🐔',turkey:'🦃',piglet:'🐷',pig:'🐖',calf:'🐮',cow:'🐄'}[a]||'🐾';
    return ANIMAL_ICON_SRC[a]?_imgTag(ANIMAL_ICON_SRC[a],e,px):e; }
  let key,e;
  if(type==='chicken'){ const turkey=a&&a.species==='turkey', adult=a?isHen(a):true;
    key=turkey?'turkey':(adult?'hen':'chick'); e=turkey?'🦃':(adult?'🐔':'🐤'); }
  else if(type==='pig'){ const g=a?isGrownPig(a):true; key=g?'pig':'piglet'; e=g?'🐖':'🐷'; }
  else if(type==='cow'){ const g=a?isGrownCow(a):true; key=g?'cow':'calf'; e=g?'🐄':'🐮'; }
  else { key=type; e=(ANIMALS[type]&&ANIMALS[type].e)||'🐾'; }
  return ANIMAL_ICON_SRC[key]?_imgTag(ANIMAL_ICON_SRC[key],e,px):e;
}
