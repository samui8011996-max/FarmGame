<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>辦公室走動試作</title>
<style>
  :root{
    --paper:#f4ecd9; --paper2:#ece0c4; --ink:#4a3b2a; --ink2:#7a6a52;
    --line:#d8c8a6; --line2:#c9b58c; --accent:#c97b4a; --accent2:#7a9b5c;
    --gold:#caa24a; --danger:#c25a4a; --card:#fbf6e9; --shadow:rgba(74,59,42,.12);
    --floor:#e3c79a; --floor2:#d8b985; --wall:#b89b72; --rug:#c98a6a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Serif TC","Songti TC",serif;font-size:16px;
    -webkit-text-size-adjust:100%;touch-action:manipulation;overscroll-behavior:none}
  body{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  .topbar{background:var(--paper2);border-bottom:2px solid var(--line2);padding:8px 12px;
    display:flex;align-items:center;gap:10px}
  .topbar .who{font-weight:700;font-size:15px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:4px 9px;font-size:14px}
  .stat b{color:var(--accent)}
  .clock{margin-left:auto;font-size:13px;color:var(--ink2)}

  .title{text-align:center;color:var(--accent);font-size:20px;font-weight:700;
    letter-spacing:2px;margin:8px 0 6px}

  /* stage */
  .stagewrap{padding:0 12px}
  .stage{position:relative;width:100%;aspect-ratio:10/9;border:3px solid var(--wall);
    border-radius:10px;overflow:hidden;background:var(--floor);box-shadow:0 3px 0 var(--shadow)}
  #game{display:block;width:100%;height:100%;image-rendering:pixelated}
  .hint{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;
    background:#3a2c1cdd;color:var(--paper);font-size:13px;padding:5px 12px;border-radius:14px;
    opacity:0;transition:opacity .15s;pointer-events:none;white-space:nowrap}
  .hint.show{opacity:1}

  /* ledger drawer under stage */
  .drawer{margin:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px;box-shadow:0 2px 0 var(--shadow);min-height:60px}
  .drawer h3{margin:0 0 8px;font-size:15px}
  .empty-note{text-align:center;color:var(--ink2);font-size:13px;padding:12px}

  /* controls */
  .controls{margin-top:auto;padding:10px 16px 18px;display:flex;align-items:flex-end;justify-content:space-between}
  .bag{width:54px;height:54px;border-radius:12px;background:var(--card);border:2px solid var(--line2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;
    box-shadow:0 2px 0 var(--shadow)}
  .bag span{font-size:10px;color:var(--ink2);margin-top:-2px}

  .dpad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,46px);
    gap:6px;align-items:center;justify-items:center}
  .key{width:46px;height:46px;border-radius:11px;font-size:20px;font-weight:700;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #00000018;
    border:2px solid #00000010}
  .key:active{transform:translateY(2px);box-shadow:0 1px 0 #00000018}
  .k-up{grid-column:2;grid-row:1;background:#bcd3e8}
  .k-left{grid-column:1;grid-row:2;background:#f0cdb0}
  .k-down{grid-column:2;grid-row:2;background:#d9c5ea}
  .k-right{grid-column:3;grid-row:2;background:#cfe2b8}

  .actbtn{width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:15px;font-weight:700;box-shadow:0 4px 0 #00000020;display:flex;align-items:center;
    justify-content:center;text-align:center;line-height:1.1}
  .actbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #00000020}
  .actbtn.dim{background:var(--line2)}

  .mask{position:fixed;inset:0;background:#3a2c1c66;z-index:50;display:none;
    align-items:flex-end;justify-content:center}
  .mask.show{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:640px;border-radius:18px 18px 0 0;
    padding:16px 16px 22px;max-height:80vh;overflow:auto}
  .sheethead{display:flex;align-items:center;margin-bottom:10px}
  .sheethead h3{margin:0;font-size:18px}
  .sheethead .close{margin-left:auto;font-size:22px;color:var(--ink2);padding:0 6px}
  .small{font-size:12px;color:var(--ink2)}
  .row{display:flex;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .row:last-child{border-bottom:none}
  .note{margin:10px 12px;font-size:12px;color:var(--ink2);text-align:center;line-height:1.6}
</style>
</head>
<body>

<div class="topbar">
  <span class="who">奈四</span>
  <span class="stat">💰<b>50</b></span>
  <span class="stat">📈<b>55</b></span>
  <span class="clock">第 1 天</span>
</div>

<div class="title">辦公室</div>

<div class="stagewrap">
  <div class="stage">
    <canvas id="game" width="320" height="288"></canvas>
    <div class="hint" id="hint"></div>
  </div>
</div>

<div class="drawer" id="drawer">
  <h3>📒 帳簿（最近）</h3>
  <div class="empty-note">走到書桌帳簿旁，按互動鍵打開</div>
</div>

<div class="note">
  試作版：用程式暫時地圖。走到 <b>帳簿 / 雇員 / 貓 / 轉蛋機</b> 旁邊，<br>
  下方會冒提示，按右下 <b>互動鍵</b> 觸發。美術之後換成你畫的房間圖。
</div>

<div class="controls">
  <div class="bag" onclick="toast('背包（之後接物品）')">🎒<span>背包</span></div>
  <div class="dpad">
    <button class="key k-up"    ontouchstart="press('up',event)"   ontouchend="release('up')"   onmousedown="press('up',event)"   onmouseup="release('up')"   onmouseleave="release('up')">↑</button>
    <button class="key k-left"  ontouchstart="press('left',event)" ontouchend="release('left')" onmousedown="press('left',event)" onmouseup="release('left')" onmouseleave="release('left')">←</button>
    <button class="key k-down"  ontouchstart="press('down',event)" ontouchend="release('down')" onmousedown="press('down',event)" onmouseup="release('down')" onmouseleave="release('down')">↓</button>
    <button class="key k-right" ontouchstart="press('right',event)" ontouchend="release('right')" onmousedown="press('right',event)" onmouseup="release('right')" onmouseleave="release('right')">→</button>
  </div>
  <button class="actbtn dim" id="actBtn" ontouchstart="interact(event)" onmousedown="interact(event)">互動</button>
</div>

<div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>
<div id="toast" style="position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:22px;font-size:14px;
  z-index:60;opacity:0;transition:opacity .2s;pointer-events:none"></div>

<script>
/* =========================================================
   辦公室走動試作
   格子地圖 (TILE)  +  角色移動  +  碰撞  +  面向  +  互動鍵
   座標單位：tile。畫布 320x288 = 20x18 tile，每格 16px。
   ========================================================= */
const TS=16;               // tile size px
const COLS=20, ROWS=18;
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

/* 地圖圖層：0=地板可走, 1=牆/家具(擋), 2=地毯(可走,純裝飾) */
/* 互動物件單獨用 objects 標座標 */
const W=1,_=0,R=2;
const MAP=[
 [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
 [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
 [W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W],
 [W,_,W,W,_,_,_,_,_,_,_,_,_,_,W,_,_,W,_,W], // 書櫃 / 衣櫃
 [W,_,W,W,_,_,_,_,_,_,_,_,_,_,W,_,_,W,_,W],
 [W,_,_,_,_,R,R,R,R,R,R,R,R,_,_,_,_,_,_,W],
 [W,_,_,_,_,R,R,R,R,R,R,R,R,_,_,W,W,W,_,W], // 床
 [W,_,_,_,_,R,R,R,R,R,R,R,R,_,_,W,W,W,_,W],
 [W,_,_,_,_,R,R,R,R,R,R,R,R,_,_,_,_,_,_,W],
 [W,_,_,W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W], // 轉蛋機(左) 
 [W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W],
 [W,_,_,_,_,_,_,W,W,_,_,_,_,_,_,_,_,_,_,W], // 書桌+帳簿
 [W,_,_,_,_,_,_,W,W,_,_,_,_,W,_,_,_,_,_,W], // 貓(右下)
 [W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W],
 [W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W],
 [W,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,W],
 [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
 [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
];

/* 互動物件：tile 座標 + emoji 圖示 + 名稱 + 開啟動作 */
const OBJECTS=[
  {id:'ledger', x:7,  y:11, w:2, h:2, e:'📒', nm:'帳簿', act:openLedger},
  {id:'cat',    x:13, y:12, w:1, h:1, e:'🐱', nm:'貓',   act:()=>toast('🐱 喵～（鎮店吉祥物）')},
  {id:'gacha',  x:3,  y:9,  w:1, h:1, e:'🎰', nm:'轉蛋機',act:openGacha},
  {id:'shelf',  x:2,  y:3,  w:2, h:2, e:'📚', nm:'書櫃', act:()=>toast('一櫃子的書，之後可放收藏')},
  {id:'staff',  x:16, y:6,  w:1, h:1, e:'👷', nm:'雇員', act:openStaff},
];

/* 玩家：以 tile 為單位，可有小數做平滑移動 */
const player={x:9, y:14, facing:'up', moving:false};
const SPEED=0.12;          // tile / frame
const held={up:false,down:false,left:false,right:false};
const DIR={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};

/* ---- input ---- */
function press(d,ev){ if(ev)ev.preventDefault(); held[d]=true; player.facing=d; }
function release(d){ held[d]=false; }
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(m[e.key]){held[m[e.key]]=true;player.facing=m[e.key];e.preventDefault();}
  if(e.key===' '||e.key==='Enter'){interact();e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(m[e.key])held[m[e.key]]=false;
});

/* ---- collision ---- */
function walkable(tx,ty){
  // 角色佔約 1 格，用腳下中心點 + 半徑判定
  const ix=Math.floor(tx), iy=Math.floor(ty);
  if(ix<0||iy<0||ix>=COLS||iy>=ROWS) return false;
  if(MAP[iy][ix]===W) return false;
  // 物件也擋路（除了貓這種可重疊的小物，這裡都當可走到旁邊即可，不踩上去）
  for(const o of OBJECTS){
    if(ix>=o.x && ix<o.x+o.w && iy>=o.y && iy<o.y+o.h) return false;
  }
  return true;
}

/* ---- 找面前那格的互動物件 ---- */
function facingObject(){
  const fx=Math.round(player.x)+DIR[player.facing].x;
  const fy=Math.round(player.y)+DIR[player.facing].y;
  for(const o of OBJECTS){
    // 面前格落在物件範圍內，或緊鄰物件任一格
    for(let oy=o.y;oy<o.y+o.h;oy++) for(let ox=o.x;ox<o.x+o.w;ox++){
      if(fx===ox && fy===oy) return o;
    }
  }
  return null;
}

/* ---- interact ---- */
function interact(ev){
  if(ev)ev.preventDefault();
  const o=facingObject();
  if(o){ o.act(); }
  else toast('面前沒有可互動的東西');
}

/* ---- update loop ---- */
function update(){
  let dx=0, dy=0;
  if(held.up)dy-=1; if(held.down)dy+=1; if(held.left)dx-=1; if(held.right)dx+=1;
  player.moving = (dx||dy)?true:false;
  if(dx||dy){
    // 正規化避免斜走變快
    const len=Math.hypot(dx,dy); dx/=len; dy/=len;
    const nx=player.x+dx*SPEED, ny=player.y+dy*SPEED;
    // 分軸判定，可貼牆滑動
    if(walkable(nx, player.y)) player.x=nx;
    if(walkable(player.x, ny)) player.y=ny;
  }
  // 互動鍵亮/暗
  const near=facingObject();
  const ab=document.getElementById('actBtn');
  ab.className='actbtn'+(near?'':' dim');
  const hint=document.getElementById('hint');
  if(near){ hint.textContent=`${near.e} ${near.nm}（按互動鍵）`; hint.classList.add('show'); }
  else hint.classList.remove('show');
}

/* ---- draw ---- */
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // floor & tiles
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=MAP[y][x];
    let col = t===W?'--wall':t===R?'--rug':((x+y)%2?'--floor':'--floor2');
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue(col).trim();
    ctx.fillRect(x*TS,y*TS,TS,TS);
    if(t===W){ // 牆面小陰影
      ctx.fillStyle='#00000018'; ctx.fillRect(x*TS,y*TS+TS-3,TS,3);
    }
  }
  // objects (emoji)
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const o of OBJECTS){
    const cx=(o.x+o.w/2)*TS, cy=(o.y+o.h/2)*TS;
    ctx.font=`${Math.min(o.w,o.h)*TS+4}px serif`;
    ctx.fillText(o.e, cx, cy);
  }
  // player
  const px=player.x*TS+TS/2, py=player.y*TS+TS/2;
  // 影子
  ctx.fillStyle='#00000022'; ctx.beginPath();
  ctx.ellipse(px,py+7,7,3,0,0,Math.PI*2); ctx.fill();
  // 身體（暫用 emoji，朝向用箭頭小點示意）
  ctx.font='17px serif';
  ctx.fillText('🧑‍🌾', px, py);
  // facing indicator
  const f=DIR[player.facing];
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.beginPath();
  ctx.arc(px+f.x*9, py+f.y*9-1, 2.2, 0, Math.PI*2); ctx.fill();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

/* =========================================================
   互動視窗（重用 sheet）
   ========================================================= */
function openSheet(h){document.getElementById('sheet').innerHTML=h;document.getElementById('mask').classList.add('show');}
function closeSheet(){document.getElementById('mask').classList.remove('show');}
document.getElementById('mask').addEventListener('click',e=>{if(e.target.id==='mask')closeSheet();});

function openLedger(){
  // 試作：把帳簿內容同時塞進下方抽屜（呼應你圖上的設計）+ 也可彈視窗
  const d=document.getElementById('drawer');
  d.innerHTML=`<h3>📒 帳簿（最近）</h3>
    <div class="row"><div style="flex:1">買番茄種子×3</div><div style="color:var(--danger)">-$6</div></div>
    <div class="row"><div style="flex:1">賣草莓×5</div><div style="color:var(--accent2)">+$40</div></div>
    <div class="row"><div style="flex:1">雇員月薪</div><div style="color:var(--danger)">-$300</div></div>`;
  toast('📒 帳簿已展開（看下方）');
}
function openStaff(){
  openSheet(`<div class="sheethead"><h3>👷 雇員</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="small" style="margin-bottom:10px">月薪 $300，自動照料、不死保險。</div>
    <button class="actbtn" style="width:100%;border-radius:12px;height:44px" onclick="toast('（試作）雇用');closeSheet()">雇用 $300/月</button>`);
}
function openGacha(){
  openSheet(`<div class="sheethead"><h3>🎰 轉蛋機</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="small" style="margin-bottom:10px">抽裝飾品擺小房間（之後接後端讀包貨數當代幣）。</div>
    <button class="actbtn" style="width:100%;border-radius:12px;height:44px" onclick="toast('（試作）轉一次！🪴');closeSheet()">轉一次</button>`);
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,1500);t.style.opacity=1;}
</script>
</body>
</html>
