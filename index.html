<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>快樂農場</title>
<style>
  :root{
    --paper:#f4ecd9; --paper2:#ece0c4; --ink:#4a3b2a; --ink2:#7a6a52;
    --line:#d8c8a6; --line2:#c9b58c; --accent:#c97b4a; --accent2:#7a9b5c;
    --gold:#caa24a; --danger:#c25a4a; --card:#fbf6e9; --shadow:rgba(74,59,42,.12);
    --grass:#9fb96a; --grass2:#94af60; --soil:#a9794f; --soil2:#9c6e46;
    --path:#d8c08a; --water:#7fb6c4; --fence:#8a6b45;
    --floor:#e3c79a; --floor2:#d8b985; --wall:#b89b72; --rug:#c98a6a;
    --tile:#e7d3ad; --tile2:#dec79c; --counter:#b98e5e; --brick:#9c6b52; --brick2:#8f6049;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Serif TC","Songti TC",serif;font-size:16px;
    -webkit-text-size-adjust:100%;touch-action:manipulation;overscroll-behavior:none}
  body{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .topbar{background:var(--paper2);border-bottom:2px solid var(--line2);padding:8px 12px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .topbar .who{font-weight:700;font-size:15px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 8px;font-size:13px}
  .stat b{color:var(--accent);font-variant-numeric:tabular-nums}
  .clock{margin-left:auto;font-size:13px;color:var(--ink2)}

  .title{text-align:center;color:var(--accent);font-size:19px;font-weight:700;letter-spacing:2px;margin:7px 0 2px}
  .recipe-bar{text-align:center;font-size:12px;color:var(--ink2);margin-bottom:4px;min-height:18px}
  .recipe-bar b{color:var(--accent)}
  .recipe-bar .step{display:inline-block;margin:0 2px;padding:1px 6px;border-radius:9px;background:var(--paper2);border:1px solid var(--line)}
  .recipe-bar .step.done{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .recipe-bar .step.cur{background:var(--gold);color:#fff;border-color:var(--gold)}

  .stagewrap{padding:0 12px;margin-top:2px}
  .stage{position:relative;width:100%;aspect-ratio:10/9;border:3px solid var(--fence);
    border-radius:10px;overflow:hidden;background:var(--grass);box-shadow:0 3px 0 var(--shadow)}
  #game{display:block;width:100%;height:100%;image-rendering:pixelated}
  .hint{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;background:#3a2c1cdd;
    color:var(--paper);font-size:13px;padding:5px 12px;border-radius:14px;opacity:0;
    transition:opacity .15s;pointer-events:none;white-space:nowrap}
  .hint.show{opacity:1}
  .ovenbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#3a2c1cdd;
    color:var(--paper);font-size:13px;padding:4px 12px;border-radius:12px;display:none;align-items:center;gap:8px}
  .ovenbar.show{display:flex}
  .ovenbar .meter{width:90px;height:8px;background:#ffffff33;border-radius:4px;overflow:hidden}
  .ovenbar .meter>i{display:block;height:100%;background:var(--accent2);width:0}
  .ovenbar.warn .meter>i{background:var(--gold)} .ovenbar.burn .meter>i{background:var(--danger)}

  .dialogue{margin:4px 12px 0px;background:var(--card);border:2px solid var(--line2);border-radius:14px;
    padding:9px 12px;display:flex;align-items:center;gap:10px;min-height:60px;box-shadow:0 2px 0 var(--shadow)}
  .dialogue .avatar{width:42px;height:42px;flex:0 0 42px;border-radius:50%;background:var(--paper2);
    border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:24px}
  .dialogue .dlgtext{flex:1;font-size:14px;line-height:1.4;color:var(--ink)}
  .dialogue.idle{opacity:.65} .dialogue.idle .dlgtext{color:var(--ink2);font-size:13px}
  .dialogue .name{font-weight:700;color:var(--accent);margin-right:5px}

  .controls{padding:8px 16px 54px;display:flex;align-items:flex-end;justify-content:space-between}
  .bag{width:52px;height:52px;border-radius:12px;background:var(--card);border:2px solid var(--line2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21px;box-shadow:0 2px 0 var(--shadow)}
  .bag span{font-size:10px;color:var(--ink2);margin-top:-2px}
  .dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:6px}
  .key{width:44px;height:44px;border-radius:11px;font-size:19px;font-weight:700;display:flex;
    align-items:center;justify-content:center;box-shadow:0 3px 0 #00000018;border:2px solid #00000010}
  .key:active{transform:translateY(2px);box-shadow:0 1px 0 #00000018}
  .k-up{grid-column:2;grid-row:1;background:#bcd3e8}
  .k-left{grid-column:1;grid-row:2;background:#f0cdb0}
  .k-down{grid-column:2;grid-row:2;background:#d9c5ea}
  .k-right{grid-column:3;grid-row:2;background:#cfe2b8}
  .actbtn{width:62px;height:62px;border-radius:50%;background:var(--accent);color:#fff;font-size:15px;
    font-weight:700;box-shadow:0 4px 0 #00000020;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1}
  .actbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #00000020}
  .actbtn.dim{background:var(--line2)}

  .nav{background:var(--paper2);border-top:2px solid var(--line2);display:flex}
  .nav button{flex:1;padding:7px 2px 8px;font-size:11px;color:var(--ink2);display:flex;
    flex-direction:column;align-items:center;gap:1px;font-weight:700}
  .nav button .ic{font-size:19px}
  .nav button.on{color:var(--accent)} .nav button.on .ic{transform:scale(1.12)}

  .mask{position:fixed;inset:0;background:#3a2c1c66;z-index:50;display:none;align-items:flex-end;justify-content:center}
  .mask.show{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:640px;border-radius:18px 18px 0 0;padding:16px 16px 22px;max-height:82vh;overflow:auto}
  .sheethead{display:flex;align-items:center;margin-bottom:10px}
  .sheethead h3{margin:0;font-size:18px}
  .sheethead .close{margin-left:auto;font-size:22px;color:var(--ink2);padding:0 6px}
  .small{font-size:12px;color:var(--ink2)}
  .row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .row:last-child{border-bottom:none}
  .row .e{font-size:22px;width:28px;text-align:center}
  .row .info{flex:1;min-width:0}
  .row .info .n{font-weight:700;font-size:14px}
  .row .info .d{font-size:12px;color:var(--ink2)}
  .price{font-variant-numeric:tabular-nums;font-weight:700}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .btn{background:var(--accent);color:#fff;border-radius:10px;padding:7px 12px;font-size:14px;font-weight:700;box-shadow:0 2px 0 #00000018;white-space:nowrap}
  .btn:active{transform:translateY(1px);box-shadow:none}
  .btn.sm{padding:5px 9px;font-size:13px}
  .btn.green{background:var(--accent2)} .btn.gold{background:var(--gold)}
  .btn.ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--line2)}
  .btn.dis{background:var(--line2);color:#fff8;pointer-events:none}
  .tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .tabs button{background:var(--paper2);border:1px solid var(--line);border-radius:16px;padding:4px 11px;font-size:13px;font-weight:700;color:var(--ink2)}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .menucard{border:2px solid var(--line);border-radius:12px;padding:9px;margin-bottom:8px;background:var(--card)}
  .menucard.on{border-color:var(--accent2);background:#f3f7ec}
  .seedchip{display:inline-flex;gap:3px;background:var(--paper2);border:1px solid var(--line);border-radius:18px;padding:3px 9px;font-size:13px;margin:3px}
  .hr{height:1px;background:var(--line);margin:9px 0}
  .empty-note{text-align:center;color:var(--ink2);font-size:13px;padding:14px}

  /* splash */
  .splash{position:fixed;inset:0;background:var(--paper);z-index:80;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center}
  .splash h1{font-size:30px;margin:0 0 4px;letter-spacing:2px}
  .splash p{color:var(--ink2);margin:0 0 22px}
  .splash input{width:100%;max-width:300px;padding:13px 14px;border:2px solid var(--line2);border-radius:12px;
    background:var(--card);text-align:center;font-weight:700;font-size:18px;margin-bottom:12px;font-family:inherit}

  #toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:9px 16px;border-radius:22px;font-size:14px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
</style>
</head>
<body>

<!-- splash -->
<div class="splash" id="splash">
  <div style="font-size:54px">🌾</div>
  <h1>快樂農場</h1>
  <p>輸入你的暱稱開始經營</p>
  <input id="nickInput" placeholder="你的暱稱" maxlength="12" autocomplete="off">
  <button class="btn" style="width:100%;max-width:300px;padding:13px" onclick="submitNick()">開始經營</button>
  <div id="saveList" style="margin-top:16px"></div>
  <p class="small" style="margin-top:18px">進度自動存在這台裝置</p>
</div>

<!-- game shell -->
<div id="shell" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <span class="who" id="whoName">—</span>
    <span class="stat">💰<b id="cash">0</b></span>
    <span class="stat">📈<b id="net">0</b></span>
    <span class="clock" id="clock">第 1 天</span>
  </div>
  <div class="title" id="sceneTitle">農牧地</div>
  <div class="recipe-bar" id="recipeBar"></div>
  <div class="stagewrap">
    <div class="stage">
      <canvas id="game" width="320" height="288"></canvas>
      <div class="ovenbar" id="ovenbar"><span id="ovenTxt">烘烤中</span><div class="meter"><i id="ovenFill"></i></div></div>
      <div class="hint" id="hint"></div>
    </div>
  </div>
  <div class="dialogue idle" id="dialogue">
    <div class="avatar" id="dlgAvatar">🙂</div>
    <div class="dlgtext" id="dlgText">用方向鍵走動，走到物件旁按互動鍵。</div>
  </div>
  <div class="controls">
    <div class="bag" onclick="openBag()">🎒<span>背包</span></div>
    <div class="dpad">
      <button class="key k-up"    ontouchstart="press('up',event)"   ontouchend="release('up')"   onmousedown="press('up',event)"   onmouseup="release('up')"   onmouseleave="release('up')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 4L19 17H3L11 4Z" fill="#4a3b2a"/></svg></button>
      <button class="key k-left"  ontouchstart="press('left',event)" ontouchend="release('left')" onmousedown="press('left',event)" onmouseup="release('left')" onmouseleave="release('left')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 11L5 3L5 19L18 11Z" fill="#4a3b2a" transform="rotate(180 11 11)"/></svg></button>
      <button class="key k-down"  ontouchstart="press('down',event)" ontouchend="release('down')" onmousedown="press('down',event)" onmouseup="release('down')" onmouseleave="release('down')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 18L3 5H19L11 18Z" fill="#4a3b2a"/></svg></button>
      <button class="key k-right" ontouchstart="press('right',event)" ontouchend="release('right')" onmousedown="press('right',event)" onmouseup="release('right')" onmouseleave="release('right')"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 11L17 3L17 19L4 11Z" fill="#4a3b2a"/></svg></button>
    </div>
    <button class="actbtn dim" id="actBtn" ontouchstart="interact(event)" onmousedown="interact(event)">互動</button>
  </div>
  <nav class="nav" id="nav">
    <button data-s="farm" onclick="goScene('farm')"><span class="ic">🌱</span>農牧地</button>
    <button data-s="cafe" onclick="goScene('cafe')"><span class="ic">☕</span>咖啡廳</button>
    <button data-s="kitchen" onclick="goScene('kitchen')"><span class="ic">👩‍🍳</span>廚房</button>
    <button data-s="shop" onclick="goScene('shop')"><span class="ic">🏪</span>商店</button>
    <button data-s="office" onclick="goScene('office')"><span class="ic">🏠</span>辦公室</button>
  </nav>
</div>

<div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

<script>
/* =========================================================
   快樂農場 — 整合版（走動 + 經營）
   引擎共用：移動/碰撞/鏡頭/對話/互動
   場景=資料：farm / cafe / kitchen / shop / office
   經濟狀態 S：共用、存 localStorage
   ========================================================= */
const NS='happy_farm_';
const HOUR=3600*1000, DAY=24*HOUR;
const TS=16, VIEW_COLS=20, VIEW_ROWS=18;
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

/* ---------- static data ---------- */
const CROPS={
  strawberry:{nm:'草莓',e:'🍓',base:8,seed:3,grow:DAY,volat:'big'},
  blueberry:{nm:'藍莓',e:'🫐',base:8,seed:3,grow:DAY,volat:'mid'},
  tomato:{nm:'番茄',e:'🍅',base:5,seed:2,grow:DAY,volat:'small'},
  papaya:{nm:'木瓜',e:'🫛',base:5,seed:2,grow:DAY,volat:'mid'},
  banana:{nm:'香蕉',e:'🍌',base:3,seed:1,grow:DAY,volat:'small'},
  guava:{nm:'芭樂',e:'🟢',base:3,seed:1,grow:DAY,volat:'small'},
  lemon:{nm:'檸檬',e:'🍋',base:5,seed:2,grow:DAY,volat:'mid'},
};
const ANIMALS={
  chicken:{nm:'雞',e:'🐔',cub:5,feed:1,prod:'egg',cycle:12,mode:'produce'},
  cow:{nm:'牛',e:'🐄',cub:25,feed:3,prod:'milk',cycle:12,mode:'produce'},
  pig:{nm:'豬',e:'🐖',cub:13,feed:2,prod:'pork',cycle:3,mode:'fatten'},
};
const PRODUCTS={
  strawberry:{nm:'草莓',e:'🍓',base:8,volat:'big'},
  blueberry:{nm:'藍莓',e:'🫐',base:8,volat:'mid'},
  tomato:{nm:'番茄',e:'🍅',base:5,volat:'small'},
  papaya:{nm:'木瓜',e:'🫛',base:5,volat:'mid'},
  banana:{nm:'香蕉',e:'🍌',base:3,volat:'small'},
  guava:{nm:'芭樂',e:'🟢',base:3,volat:'small'},
  lemon:{nm:'檸檬',e:'🍋',base:5,volat:'mid'},
  egg:{nm:'egg',e:'📦',base:10,volat:'mid'},
  milk:{nm:'milk',e:'📦',base:10,volat:'mid'},
  pork:{nm:'pork',e:'📦',base:10,volat:'mid'},
};
const EXTRAS={flour:{nm:'麵粉',e:'🌾',price:2},sugar:{nm:'糖',e:'🧂',price:1}};
const RECIPES={
  strawberry_tart:{nm:'草莓塔',e:'🍰',price:28,batch:30,
    steps:[
      {key:'cut',label:'切材料',ing:'strawberry',need:2},
      {key:'knead',label:'揉製',taps:4},
      {key:'bake',label:'進烤箱'}
    ]},
  banana_pudding:{nm:'香蕉布丁',e:'🍮',price:12,batch:30,
    steps:[
      {key:'cut',label:'切材料',ing:'strawberry',need:2},
      {key:'knead',label:'揉製',taps:4},
      {key:'bake',label:'進烤箱'}
    ]},
};
const QUAL_MUL={bad:0.5,normal:1,good:1.8};
const STORE_CAP=200;
const BAKE_MS=10000, BURN_MS=14000;
/* ---------- 農作物表（要加新作物就在這裡加一筆） ---------- */
const FARM_CROPS={
  strawberry:{ nm:'草莓', img:'strawberry.png', fw:32, fh:32,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3, seed:3 },
  corn:{ nm:'玉米', img:'corn.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:40000, yield:4, seed:2 },
  blueberry:{ nm:'藍莓', img:'blueberry.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
  tomato:{ nm:'番茄', img:'tomato.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
  papaya:{ nm:'木瓜', img:'papaya.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
  banana:{ nm:'香蕉', img:'banana.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
  guava:{ nm:'芭樂', img:'guava.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
  lemon:{ nm:'檸檬', img:'lemon.png', fw:64, fh:64,
    stages:['播種','發芽','成長','開花','結果'], frame:[0,1,2,3,4],
    grow:30000, yield:3 },
};
for(const k in FARM_CROPS){ const d=FARM_CROPS[k];   // 預載圖＋算每階段時間
  d._img=new Image(); d._img.src=d.img;
  d.stageMs=d.grow/(d.stages.length-1);
}
function fmtSec(ms){const s=Math.max(0,Math.ceil(ms/1000));return s>=60?Math.ceil(s/60)+'分':s+'秒';}     // 之後可加品質/施肥

/* ---------- 時代系統（第一步：解鎖門檻） ---------- */
const CROP_ERA={ strawberry:17, tomato:17, guava:17, lemon:17, corn:17,
                 blueberry:18, papaya:18, banana:19 };
const RECIPE_ERA={ strawberry_tart:17, banana_pudding:19 };
function cropEra(k){ return CROP_ERA[k]||17; }
function recipeEra(k){ return RECIPE_ERA[k]||17; }
/* ---------- 裝潢系統 ---------- */
const DECOR={
  17:{
    sign:   [{id:'wood_sign',   nm:'木製招牌',  price:40,  cap:4,  buff:'每日客流上限 +4'}],
    counter:[{id:'wood_counter',nm:'原木吧檯',  price:60,          buff:'基礎吧檯'}],
    floor:  [{id:'stone_floor', nm:'石板地牆',  price:50,          buff:'基礎裝潢'}],
  },
  18:{
    sign:   [{id:'carved_sign', nm:'雕花招牌',  price:120, cap:8,  buff:'每日客流上限 +8'}],
    counter:[{id:'tile_counter',nm:'磁磚吧檯',  price:160,         buff:'洛可可風'}],
    floor:  [{id:'rococo_floor',nm:'洛可可磁磚',price:140,         buff:'氛圍提升'}],
  },
  19:{
    sign:   [{id:'brass_sign',  nm:'黃銅招牌',  price:300, cap:14, buff:'每日客流上限 +14'}],
    counter:[{id:'iron_counter',nm:'工業吧檯',  price:360,         buff:'維多利亞風'}],
    floor:  [{id:'marble_floor',nm:'大理石地牆',price:320,         buff:'氛圍提升'}],
    light:  [{id:'chandelier',  nm:'水晶吊燈',  price:400,         buff:'解鎖夜間營業'}],
  },
};
function blankDecor(){ const o={}; for(const era in DECOR){ o[era]={}; for(const slot in DECOR[era]) o[era][slot]=null; } return o; }
function decorDone(era){ const cat=DECOR[era]||{}; return Object.keys(cat).every(s=>S.decor[era]&&S.decor[era][s]); }
function decorCap(){ const cat=DECOR[S.era]; if(!cat||!cat.sign)return 0; const id=S.decor[S.era].sign; if(!id)return 0; const o=cat.sign.find(x=>x.id===id); return o&&o.cap?o.cap:0; }
function slotName(s){ return {sign:'招牌',counter:'吧檯／廚具',floor:'地板＋牆面',light:'燈光'}[s]||s; }
function openDecor(){
  const era=S.era, cat=DECOR[era]||{}; let body='';
  for(const slot in cat){
    body+=`<b class="small">${slotName(slot)}</b>`;
    for(const opt of cat[slot]){
      const owned=S.decor[era][slot]===opt.id;

/* ---------- market: mean reversion + shocks ---------- */
function rollMarket(){
  for(const k in PRODUCTS){
    const p=PRODUCTS[k];const m=S.market[k]||{price:p.base};
    const[sa,ba]=volRange(p.volat);
    let price=m.price+(p.base-m.price)*0.45;
    price+=price*(Math.random()*2-1)*sa*0.5;
    if(Math.random()<0.10){const d=Math.random()<0.5?-1:1;price=price*(1+d*(ba*0.5+Math.random()*ba*0.5));}
    price=Math.max(p.base*0.35,price);
    m.price=Math.round(price*10)/10;S.market[k]=m;
  }
  S.marketDay=S.day;
}
function priceOf(k){return S.market[k]?S.market[k].price:PRODUCTS[k].base;}
function priceDir(k){const m=S.market[k];if(!m)return 0;return m.price>PRODUCTS[k].base*1.05?1:m.price<PRODUCTS[k].base*0.95?-1:0;}

/* ---------- tick: time progression ---------- */
function tick(){
  const now=Date.now();
  const newDay=Math.floor((now-S.startTs)/DAY)+1;
  if(newDay>S.day || !S.market.strawberry){ S.day=Math.max(S.day,newDay); if(S.marketDay!==S.day) rollMarket(); }
  // employee wages
  if(S.employee){
    while(now-S.employee.lastPaidTs>=30*DAY){
      if(S.cash>=300){spend(300,'雇員月薪');S.employee.lastPaidTs+=30*DAY;addLog('💸 付雇員月薪 $300');}
      else{addLog('👷 沒錢付月薪，雇員離職');S.employee=null;break;}
    }
  }
  const emp=!!S.employee;
  // crops（每格、要澆水才長）
 for(const key in S.crops){
    const c=S.crops[key]; const def=FARM_CROPS[c.crop]; if(!def){delete S.crops[key];continue;}
    const last=def.stages.length-1;
    if(emp) c.watered=true;
    if(c.stage<last && c.watered && now-c.t>=def.stageMs){ c.stage++; if(!emp)c.watered=false; c.t=now; }
    if(emp && c.stage===last){ addStore(c.crop,Math.round(def.yield*0.6)); delete S.crops[key]; }
  }
  // animals
  for(const type in S.animals){
    const def=ANIMALS[type];
    S.animals[type]=S.animals[type].filter(a=>{
      if(emp)a.fed=now;
      if(!emp && now-(a.fed||a.born)>2*DAY){ addLog(`☠️ 一隻${def.nm}太久沒餵死了`); return false; }
      if(def.mode==='produce'){
        const n=Math.floor((now-(a.lastProd||a.born))/def.cycle);
        if(n>0){a.pending=(a.pending||0)+n;a.lastProd=(a.lastProd||a.born)+n*def.cycle;
          if(emp){const g=Math.floor(a.pending*0.6);if(g>0)addStore(def.prod,g);a.pending=0;}}
      }else if(now-a.born>=def.cycle)a.fat=true;
      return true;
    });
  }
  runCafe(now);
  S.lastTick=now;
}
function baseYield(p){let y=3;if(p.qual==='good')y=Math.round(y*1.5);if(p.qual==='bad')y=Math.round(y*0.5);if(p.fert)y=Math.round(y*1.5);return Math.max(1,y);}

function runCafe(now){
  if(!S.cafe.staff||S.cafe.menu.length===0){S.cafe.lastRun=now;return;}
  let days=Math.min(7,Math.floor((now-(S.cafe.lastRun||now))/DAY));
 if(days<=0)return;

    for(const k of [...S.cafe.menu].sort(()=>Math.random()-0.5)){
      if(toSell<=0)break;const av=S.cafe.goods[k]||0;const s=Math.min(av,Math.ceil(toSell/S.cafe.menu.length)+2,toSell);
      rev+=s*RECIPES[k].price;S.cafe.goods[k]-=s;toSell-=s;
    }
    rev-=20;if(rev<0)rev=0;S.cafe.till+=rev;
  }
  S.cafe.lastRun=(S.cafe.lastRun||now)+days*DAY;
}
function netWorth(){
  let n=S.cash+(S.cafe.till||0);
  for(const k in S.store)n+=(S.store[k]||0)*priceOf(k);
  for(const k in S.cafe.goods)n+=(S.cafe.goods[k]||0)*RECIPES[k].price;
  for(const t in S.animals)n+=S.animals[t].length*ANIMALS[t].cub;
  n+=S.fert*6+S.feed*1;
  return n;
}

/* ---------- engine: scene accessors ---------- */
function grid(){return GRID[curScene];}
function sceneDef(){return SCENES[curScene];}
function mapCols(){return grid()[0].length;}
function mapRows(){return grid().length;}
function tileAt(x,y){const g=grid();if(x<0||y<0||x>=mapCols()||y>=mapRows())return g===GRID.farm?'F':'W';return g[y][x];}
function blocked(ch){return ch==='F'||ch==='W'||ch==='B'||ch==='C'||ch==='T'||ch==='S'||ch==='R'&&false;}
function walkable(tx,ty){
  const ix=Math.floor(tx),iy=Math.floor(ty);
  if(blocked(tileAt(ix,iy)))return false;
  for(const o of sceneDef().objects) if(ix===o.x&&iy===o.y) return false;
  return true;
}
function facingObject(){
  const bx=Math.round(player.x), by=Math.round(player.y), d=DIR[player.facing];
  let best=null, bestScore=Infinity;
  for(const o of sceneDef().objects){
    const dx=o.x-bx, dy=o.y-by;
    if(Math.max(Math.abs(dx),Math.abs(dy))>SENSE) continue;     // 在範圍內
    const align=dx*d.x+dy*d.y;                                   // >0 = 在面前方向
    const score=(Math.abs(dx)+Math.abs(dy))-align*0.6;           // 近的、面前的優先
    if(score<bestScore){ bestScore=score; best=o; }
  }
  return best;
}
function updateCamera(){
  let cx=player.x-VIEW_COLS/2+0.5, cy=player.y-VIEW_ROWS/2+0.5;
  cam.x=Math.max(0,Math.min(cx,mapCols()-VIEW_COLS));
  cam.y=Math.max(0,Math.min(cy,mapRows()-VIEW_ROWS));
}

/* ---------- interact dispatch ---------- */
let dlgNpc=null, dlgIdx=0;
function interact(ev){
  if(ev)ev.preventDefault();
  // 坐在書桌時：互動鍵 = 翻開帳簿
  if(sitting){ openLedger(); return; }
  if(!sitting && curScene===CHAIR.scene && Math.round(player.x)===CHAIR.x && Math.round(player.y)===CHAIR.y){ askSit(); return; }
  if(!sleeping && curScene===BED.scene && Math.round(player.x)>=BED.x1 && Math.round(player.x)<=BED.x2 && Math.round(player.y)>=BED.y1 && Math.round(player.y)<=BED.y2){ askSleep(); return; }
 if(curScene==='farm'){
    const key=farmCellNear();
    if(key){ openTileFarm(key); return; }
    const z=farmZoneAt(player.x,player.y);
    if(z && z.kind!=='plot'){ openAnimals(z.kind); return; }
  }
  const o=facingObject();
  if(!o){toast('面前沒有可互動的東西');return;}
  switch(o.kind){
    case 'npc': if(o.lines){dlgIdx=(dlgIdx+1)%o.lines.length;showDlg(o);} return;
    case 'farm': return openFarm(o.plotIdx);
    case 'animals': return openAnimals(o.atype);
    case 'ledger': return openLedger();
    case 'employee': return openEmployee();
    case 'menu': return openMenu();
    case 'decor': return openDecor();
    case 'eraBoard': return openEra();
    case 'till': return collectTill();
    case 'brew': return toast('☕ （試作）泡咖啡：之後接咖啡商品');
    case 'shopBuy': return openShopBuy();
    case 'shopSell': return openShopSell();
    case 'pickrecipe': return openPickRecipe();
    case 'cut': return kCut();
    case 'knead': return kKnead();
    case 'oven': return kOven();
    case 'gotoShop': return goScene('shop');
    case 'gotoKitchen': return goScene('kitchen');
    case 'gotoCafe': return goScene('cafe');
    case 'gotoFarm': return goScene('farm');
  }
}

function kCut(){const r=curRecipe();const st=r.steps[0];
  if(prep.cut>=st.need){say('切夠了，去揉/拌！');return;}
  if((S.store[st.ing]||0) < (prep.cut+1)){say(`材料不足！需要${PRODUCTS[st.ing].nm}，去農田收或商店買。`);return;}
  prep.cut++;toast(`🔪 ${st.label} ${prep.cut}/${st.need}`);if(prep.cut>=st.need)say('切好了，下一步揉/拌。');}
function kKnead(){const r=curRecipe();
  if(prep.cut<r.steps[0].need){say('先去切！');return;}
  if(prep.knead>=r.steps[1].taps){say('好了，拿去烤箱！');return;}
  prep.knead++;toast(`🫓 ${r.steps[1].label} ${prep.knead}/${r.steps[1].taps}`);if(prep.knead>=r.steps[1].taps)say('好了，去烤箱開烤。');}
function kOven(){const r=curRecipe();
  if(prep.inOven){const t=Date.now()-prep.ovenStart;if(t<BAKE_MS){say(`還沒好，再等 ${Math.ceil((BAKE_MS-t)/1000)} 秒。`);return;}finishBake(t);}
  else{ if(prep.cut<r.steps[0].need||prep.knead<r.steps[1].taps){say('材料還沒備好。');return;}
    // consume ingredients
    const st=r.steps[0]; S.store[st.ing]=(S.store[st.ing]||0)-st.need;
    prep.inOven=true;prep.ovenStart=Date.now();toast('🔥 開烤！10秒出爐，別超過14秒');say('烘烤中…時間到回烤箱出爐。');save();}
}
function finishBake(t){
  prep.inOven=false;
  if(t>BURN_MS){toast('💀 燒焦了！這批報廢');say('焦了…重新備料。');}
  else{const r=curRecipe();S.cafe.goods[S.curRecipe]=(S.cafe.goods[S.curRecipe]||0)+r.batch;toast(`✅ 出爐 +${r.batch} 個${r.nm}`);say(`完美！可上架或再做。`);}
  prep.cut=0;prep.knead=0;save();
}

function buyFert(q){const c=Math.round((S._fp||6)*q);if(S.cash<c){toast('現金不足');return;}spend(c,`買肥料×${q}`);S.fert+=q;toast(`+${q}肥料`);openShopBuy();save();}

function openShopSell(){
  let raw='';let any=false;
  for(const k in PRODUCTS){if(k==='pork')continue;const have=S.store[k]||0;const price=priceOf(k);const dir=priceDir(k);
    const arrow=dir>0?'<span class="up">▲</span>':dir<0?'<span class="down">▼</span>':'';
    raw+=`<div class="row"><div class="e">${PRODUCTS[k].e}</div><div class="info"><div class="n">${PRODUCTS[k].nm} <span class="small">基準$${PRODUCTS[k].base}</span></div>
      <div class="d">庫存 ${have}</div></div><div class="price">$${price} ${arrow}</div>
      <button class="btn sm ${have<=0?'dis':'green'}" onclick="sellProduct('${k}')">全賣</button></div>`;
    if(have>0)any=true;}
  let goods='';
  for(const k in RECIPES){const have=S.cafe.goods[k]||0;
    goods+=`<div class="row"><div class="e">${RECIPES[k].e}</div><div class="info"><div class="n">${RECIPES[k].nm}</div><div class="d">庫存 ${have}</div></div>
      <div class="price">$${RECIPES[k].price}</div><button class="btn sm ${have<=0?'dis':'green'}" onclick="sellGood('${k}')">全賣</button></div>`;}
  openSheet(`<div class="sheethead"><h3>💵 收購</h3><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="small">賣價每天浮動，會暴漲暴跌。${any?'':'（農畜產庫存空）'}</div><div class="hr"></div>
    <b class="small">農畜產品</b>${raw}<div class="hr"></div><b class="small">加工品</b>${goods}`);

function sellProduct(k){const have=S.store[k]||0;if(have<=0)return;const total=Math.round(priceOf(k)*have);S.store[k]=0;earn(total,`賣${PRODUCTS[k].nm}×${have}`);toast(`💰 +$${fmt(total)}`);openShopSell();save();}
function sellGood(k){const have=S.cafe.goods[k]||0;if(have<=0)return;const total=RECIPES[k].price*have;S.cafe.goods[k]=0;earn(total,`賣${RECIPES[k].nm}×${have}`);toast(`💰 +$${fmt(total)}`);openShopSell();save();}

/* ---------- loop ---------- */
let tickAccum=0;
function update(){
  let dx=0,dy=0;
  if(held.up)dy-=1;if(held.down)dy+=1;if(held.left)dx-=1;if(held.right)dx+=1;
  const moving = (dx||dy);                         // ← 新增：有沒有在動
  if(moving){const len=Math.hypot(dx,dy);dx/=len;dy/=len;
    const nx=player.x+dx*SPEED,ny=player.y+dy*SPEED;
    const foot=0.5;
if(walkable(nx+0.5,player.y+foot))player.x=nx;
    if(walkable(player.x+0.5,ny+foot))player.y=ny;}

  // ← 新增：走路動畫
  if(moving){
    animTimer++;
    if(animTimer>=WALK_SPEED){ animTimer=0; walkStep=(walkStep+1)%WALK_CYCLE.length; }
    animFrame=WALK_CYCLE[walkStep];
  }else{
    animFrame=0; animTimer=0; walkStep=0;          // 停下來→回到收步
  }
document.getElementById('sceneTitle').textContent='('+Math.round(player.x)+','+Math.round(player.y)+')';
  updateCamera();
  const onChair = (curScene===CHAIR.scene && Math.round(player.x)===CHAIR.x && Math.round(player.y)===CHAIR.y);
  const onBed = (curScene===BED.scene
    && Math.round(player.x)>=BED.x1 && Math.round(player.x)<=BED.x2
    && Math.round(player.y)>=BED.y1 && Math.round(player.y)<=BED.y2);
  if(!onChair) sitting=false;   // 離開椅子→起身
  if(!onBed) sleeping=false;    // 離開床→起來
  // oven ui
  const ob=document.getElementById('ovenbar');
  if(curScene==='kitchen'&&prep.inOven){const t=Date.now()-prep.ovenStart;ob.classList.add('show');
    document.getElementById('ovenFill').style.width=Math.min(100,(t/BAKE_MS)*100)+'%';
    ob.classList.toggle('warn',t>=BAKE_MS&&t<=BURN_MS);ob.classList.toggle('burn',t>BURN_MS);
    document.getElementById('ovenTxt').textContent=t<BAKE_MS?`烘烤中 ${(t/1000).toFixed(1)}s`:t<=BURN_MS?'✅快出爐':'💀燒焦中';
  }else ob.classList.remove('show');
  // hint + dialogue
  const near=facingObject();
  
  const hint=document.getElementById('hint');
  if(sitting){
    document.getElementById('actBtn').className='actbtn';
    hint.textContent='📒 翻開帳簿（互動鍵）／按方向鍵起身';
    hint.classList.add('show');
 }else if(sleeping){
    document.getElementById('actBtn').className='actbtn dim';
    hint.textContent='😴 睡覺中・按方向鍵起床';
    hint.classList.add('show');
 }else{
    let onTile = null;
    if(curScene==='farm'){
      const fx=Math.round(player.x)+DIR[player.facing].x, fy=Math.round(player.y)+DIR[player.facing].y;
      const front=cellKeyAt(fx,fy), here=farmTileHere();
      if(front && S.crops[front]) onTile=front;
      else if(here && !S.crops[here]) onTile=here;
      else if(front) onTile=front;
    }
    const zone   = curScene==='farm' ? farmZoneAt(player.x,player.y) : null;
    const animal = zone && zone.kind!=='plot' ? zone : null;
    document.getElementById('actBtn').className='actbtn'+((near||onTile||animal||onChair||onBed)?'':' dim');
    if(near&&near.npc){if(dlgNpc!==near.id){dlgNpc=near.id;dlgIdx=0;showDlg(near);}hint.classList.remove('show');}
    else if(near){dlgNpc=null;if(!say._t)idleDlg();hint.textContent=`${near.e} ${near.nm}（互動鍵）`;hint.classList.add('show');}
    else if(onTile){dlgNpc=null;if(!say._t)idleDlg();
      const c=S.crops[onTile];
      if(!c){ hint.textContent='🟫 播種（互動鍵）'; }
      else { const def=FARM_CROPS[c.crop];
        hint.textContent = c.stage>=def.stages.length-1 ? `🧺 收成${def.nm}（互動鍵）`
          : `${def.nm}・${def.stages[c.stage]}${c.watered?'':'・需澆水'}（互動鍵）`; }
      hint.classList.add('show');}
    else if(animal){dlgNpc=null;if(!say._t)idleDlg();hint.textContent=`${ANIMALS[animal.kind].e} ${animal.nm}・餵食/收成（互動鍵）`;hint.classList.add('show');}
    else if(onChair){dlgNpc=null;if(!say._t)idleDlg();hint.textContent='🪑 坐下（互動鍵）';hint.classList.add('show');}
    else if(onBed){dlgNpc=null;if(!say._t)idleDlg();hint.textContent='🛏️ 睡覺（互動鍵）';hint.classList.add('show');}
    else{dlgNpc=null;if(!say._t)idleDlg();hint.classList.remove('show');}
  }
  renderRecipeBar();
  // periodic tick (every ~2s) for time progression
  tickAccum++; if(tickAccum>=120){tickAccum=0;tick();refreshTop();save();}
}
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function tileColor(ch,x,y){
  switch(ch){
    case 'F':return '--fence'; case 'W':return '--wall'; case 'B':return '--brick';
    case 'P':return '--path';
    case '.':return curScene==='farm'?((x+y)%2?'--soil':'--soil2'):((x+y)%2?'--floor':'--floor2');
    case 'R':return '--rug'; case 'D':return '--accent2';
    case 'C':case 'T':case 'S':return '--counter';
    case 'G':return (x+y)%2?'--grass':'--grass2';
    default: return curScene==='farm'?((x+y)%2?'--grass':'--grass2'):((x+y)%2?'--floor':'--floor2');
  }
}

  SCENE_BG[scene] = img;
}

loadFg('office', 'office_desk.png');       // 整張透明、只有桌子的那張

SIT_IMG.src = 'sit.png';   // 坐著的樣子（背面）
const SLEEP_IMG = new Image();
SLEEP_IMG.src = 'sleep.png';
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const big=sceneDef().big;const ox=Math.round(cam.x*TS),oy=Math.round(cam.y*TS);
  const sx=big?Math.floor(cam.x)-1:0, ex=big?Math.floor(cam.x)+VIEW_COLS+1:mapCols();
  const sy=big?Math.floor(cam.y)-1:0, ey=big?Math.floor(cam.y)+VIEW_ROWS+1:mapRows();
  const bg = SCENE_BG[curScene+'_'+S.era] || SCENE_BG[curScene];
  if (bg && bg.complete && bg.naturalWidth) {
    // 這個場景有底圖且載入好了 → 鋪滿整個舞台
    ctx.drawImage(bg, -ox, -oy, bg.naturalWidth, bg.naturalHeight);
  } else {
    // 沒圖（或還沒載入）→ 用原本的色塊格子
    for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
      const ch=tileAt(x,y);
      ctx.fillStyle=cssVar(tileColor(ch,x,y));
      ctx.fillRect(x*TS-ox,y*TS-oy,TS,TS);
    if(ch==='W'||ch==='F'||ch==='B'){ctx.fillStyle='#00000022';ctx.fillRect(x*TS-ox,y*TS-oy+TS-3,TS,3);}
    }
  }
  // DEBUG：顯示碰撞格（對齊家具用，調好後把 DEBUG 改成 false）
// DEBUG：作物格範圍（每框=一株=CELL×CELL）。Console 打 DEBUG_CROPCELL=true 開啟
  if (window.DEBUG_CROPCELL && curScene==='farm') {
    ctx.lineWidth=1; ctx.strokeStyle='rgba(20,120,255,.95)';
    ctx.font='9px monospace'; ctx.fillStyle='rgba(10,80,200,.95)'; ctx.textAlign='left'; ctx.textBaseline='top';
    for(const z of FARM_ZONES){ if(z.kind!=='plot') continue;
      for(let cy=Math.floor(z.y1/CELL)*CELL; cy<=z.y2; cy+=CELL)
      for(let cx=Math.floor(z.x1/CELL)*CELL; cx<=z.x2; cx+=CELL){
        const X=cx*TS-ox, Y=cy*TS-oy;
        ctx.strokeRect(X+0.5,Y+0.5,CELL*TS,CELL*TS);
        ctx.fillText(cx+','+cy, X+2, Y+1);
      }
    }
  }
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const o of sceneDef().objects){
    let icon=o.e;
    if(o.kind==='farm'){const p=S.plots[o.plotIdx];icon=!p||p.stage==='empty'||!p.stage?'🟫':p.stage==='growing'?'🌱':CROPS[p.crop].e;}
    if(o.kind==='animals'){const n=S.animals[o.atype].length;if(n===0)icon='⬜';}
    if(o.kind==='oven'&&prep.inOven){const t=Date.now()-prep.ovenStart;icon=t>BURN_MS?'💀':t>=BAKE_MS?'✅':'🔥';}
    if(curScene!=='farm'){ctx.fillStyle=cssVar('--counter');ctx.fillRect(o.x*TS-ox+1,o.y*TS-oy+1,TS-2,TS-2);}
    ctx.font='13px serif';ctx.fillText(icon,(o.x+0.5)*TS-ox,(o.y+0.5)*TS-oy);
  }
  if(curScene==='farm'){
    const SZ=CELL*TS;
    for(const key in S.crops){
      const c=S.crops[key], def=FARM_CROPS[c.crop]; if(!def) continue;
      if(!(def._img.complete && def._img.naturalWidth)) continue;
      const [tx,ty]=key.split(',').map(Number);
      const fr=def.frame[c.stage]||0;
      ctx.drawImage(def._img, fr*def.fw,0,def.fw,def.fh, tx*TS-ox, ty*TS-oy, SZ, SZ);
      if(!c.watered && c.stage<def.stages.length-1){ ctx.font='12px serif'; ctx.fillText('💧',(tx+CELL/2)*TS-ox,(ty)*TS-oy); }
    }
  }
  const px=Math.round(player.x*TS+TS/2-ox), py=Math.round(player.y*TS+TS/2-oy);

   if (sitting || sleeping) {
    // 坐著：這裡先不畫，人物消失（坐姿圖留到最後畫，蓋過桌子）
  } else {
    // 沒坐：照常畫影子＋走路的小人
    ctx.fillStyle='#00000022';
    ctx.beginPath();ctx.ellipse(px,py+6,12,4,0,0,Math.PI*2);ctx.fill();
    if (PLAYER_IMG.complete && PLAYER_IMG.naturalWidth) {
      const spriteW=64, spriteH=64;
      const dirCols={ down:0, left:1, right:2, up:3 };
      const colIndex=dirCols[player.facing]||0;
      const sx=colIndex*spriteW;
      const sy=animFrame*spriteH;
      ctx.drawImage(PLAYER_IMG, sx, sy, spriteW, spriteH, px-32, py-64+14, 64, 64);
    } else {
      ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🧑‍🌾', px, py);
    }
  }
// DEBUG：人物碰撞點。Console 打 DEBUG_PLAYER=true 開啟
 if(window.DEBUG_SENSE){
    const bx=Math.round(player.x), by=Math.round(player.y);
    ctx.strokeStyle='rgba(0,180,80,.85)'; ctx.lineWidth=1;
    ctx.strokeRect((bx-SENSE)*TS-ox+0.5,(by-SENSE)*TS-oy+0.5,(SENSE*2+1)*TS,(SENSE*2+1)*TS);
  }
 // === 前景：桌子畫在人物之後 → 蓋在人物上面 ===
  const fg = SCENE_FG[curScene];
  if (fg && fg.complete && fg.naturalWidth) {
    ctx.drawImage(fg, -ox, -oy, mapCols()*TS, mapRows()*TS);
  }

  // === 坐姿圖：畫在最上面，連桌子都蓋過去 ===
  if (sitting && SIT_IMG.complete && SIT_IMG.naturalWidth) {
    ctx.drawImage(SIT_IMG, -ox, -oy, mapCols()*TS, mapRows()*TS);
  }
  
// === 坐姿圖：畫在最上面，連桌子都蓋過去 ===
  if (sitting && SIT_IMG.complete && SIT_IMG.naturalWidth) {
    ctx.drawImage(SIT_IMG, -ox, -oy, mapCols()*TS, mapRows()*TS);
  }

  // === 睡姿圖：一樣畫在最上面 ===
  if (sleeping && SLEEP_IMG.complete && SLEEP_IMG.naturalWidth) {
    ctx.drawImage(SLEEP_IMG, -ox, -oy, mapCols()*TS, mapRows()*TS);
  }
}

function listSaves(){const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(NS))out.push(k.slice(NS.length));}return out;}

  box.innerHTML='<div class="small" style="margin-bottom:6px">繼續之前的存檔</div>'+s.map(n=>`<button class="btn ghost sm" style="margin:3px" onclick="startGame('${n}')">${n}</button>`).join('');}

function startGame(n){
  user=n;const saved=load(n);S=saved||blankState();
  if(!saved){rollMarket();addLog('🌾 開張！起始 $50，送 1 貓 1 雞。');}
  // migration safety
  if(!S.animals.cow)S.animals.cow=[];if(!S.animals.pig)S.animals.pig=[];
  if(!S.cafe.goods)S.cafe.goods={};if(!S.curRecipe)S.curRecipe='strawberry_tart';
  if(!S.crops)S.crops={};
  if(!S.era)S.era=17;
  if(!S.decor)S.decor=blankDecor();
  else for(const era in DECOR){ S.decor[era]=S.decor[era]||{}; for(const slot in DECOR[era]) if(!(slot in S.decor[era])) S.decor[era][slot]=null; }
  if(!S.decor)S.decor=blankDecor();
  else for(const era in DECOR){ S.decor[era]=S.decor[era]||{}; for(const slot in DECOR[era]) if(!(slot in S.decor[era])) S.decor[era][slot]=null; }
  document.getElementById('splash').style.display='none';
  document.getElementById('shell').style.display='flex';
  goScene('farm');
}
document.getElementById('nickInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitNick();});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&S){tick();refreshTop();save();}});
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,1500);}

renderSaveList();
loop();
</script>
